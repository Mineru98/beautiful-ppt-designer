<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Beautiful-PPT Style Compare</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Noto Sans CJK KR", "Segoe UI", sans-serif; background: #f5f5f7; color: #1d1d1f; padding: 24px; }
header { text-align: center; margin-bottom: 24px; }
header h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
header p { color: #6e6e73; font-size: 14px; }
.back-link { display: inline-block; margin-bottom: 16px; color: #0071e3; text-decoration: none; font-size: 14px; }
.back-link:hover { text-decoration: underline; }
.controls { display: flex; justify-content: center; gap: 24px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.controls label { font-size: 13px; color: #6e6e73; }
.controls select { padding: 8px 12px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 14px; background: #fff; min-width: 220px; }
.tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
.tabs button { padding: 8px 20px; border: 1px solid #d2d2d7; border-radius: 8px; background: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s; }
.tabs button:hover { border-color: #0071e3; color: #0071e3; }
.tabs button.active { background: #0071e3; color: #fff; border-color: #0071e3; }
.compare-area { display: flex; gap: 20px; justify-content: center; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; }
.iframe-wrapper { flex: 1; min-width: 300px; max-width: 560px; background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }
.iframe-wrapper .label { padding: 10px 16px; font-size: 13px; font-weight: 600; border-bottom: 1px solid #e5e5ea; background: #fafafa; }
.iframe-container { position: relative; width: 100%; padding-top: 56.25%; overflow: hidden; }
.iframe-container iframe { position: absolute; top: 0; left: 0; width: 960px; height: 540px; transform-origin: top left; border: none; }
.palette-compare { max-width: 1200px; margin: 32px auto 0; background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; }
.palette-compare h3 { padding: 14px 20px; font-size: 15px; border-bottom: 1px solid #e5e5ea; background: #fafafa; }
.palette-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.palette-table th { text-align: left; padding: 10px 16px; color: #6e6e73; font-weight: 500; border-bottom: 1px solid #f0f0f5; }
.palette-table td { padding: 10px 16px; border-bottom: 1px solid #f0f0f5; }
.palette-table .color-cell { display: flex; align-items: center; gap: 8px; }
.palette-table .color-dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.15); flex-shrink: 0; }
footer { text-align: center; margin-top: 40px; color: #6e6e73; font-size: 13px; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← 갤러리로 돌아가기</a>
<header>
  <h1>스타일 비교</h1>
  <p>두 가지 디자인 스타일을 나란히 비교하세요</p>
</header>

<div class="controls">
  <div>
    <label>스타일 A</label><br>
    <select id="selectA"></select>
  </div>
  <div style="font-size:24px;color:#d2d2d7;padding-top:18px">vs</div>
  <div>
    <label>스타일 B</label><br>
    <select id="selectB"></select>
  </div>
</div>

<div class="tabs" id="tabs">
  <button class="active" data-slide="cover">표지</button>
  <button data-slide="content">본문</button>
  <button data-slide="data">데이터</button>
</div>

<div class="compare-area">
  <div class="iframe-wrapper">
    <div class="label" id="labelA">스타일 A</div>
    <div class="iframe-container"><iframe id="frameA"></iframe></div>
  </div>
  <div class="iframe-wrapper">
    <div class="label" id="labelB">스타일 B</div>
    <div class="iframe-container"><iframe id="frameB"></iframe></div>
  </div>
</div>

<div class="palette-compare">
  <h3>컬러 팔레트 비교</h3>
  <table class="palette-table" id="paletteTable">
    <thead><tr><th>속성</th><th>스타일 A</th><th>스타일 B</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<footer>Beautiful-PPT &middot; Typst 기반 프레젠테이션 생성 도구</footer>

<script>
const themes = {
  "minimal-clean":{name:"미니멀 클린",primary:"#1A1A1A",secondary:"#4A4A4A",accent:"#0066CC",background:"#FFFFFF",surface:"#F7F7F7",text:"#1A1A1A",textLight:"#767676",heading:"#0D0D0D",border:"#E0E0E0"},
  "corporate-modern":{name:"코퍼레이트 모던",primary:"#003366",secondary:"#005B9A",accent:"#FF6B00",background:"#F4F6F9",surface:"#FFFFFF",text:"#1C2B3A",textLight:"#5A7A99",heading:"#003366",border:"#CBD8E5"},
  "gradient-flow":{name:"그라디언트 플로우",primary:"#6C3DE0",secondary:"#E03D8F",accent:"#00D4FF",background:"#0F0A2E",surface:"rgba(255,255,255,0.10)",text:"#F0EEFF",textLight:"#A89FCE",heading:"#FFFFFF",border:"rgba(255,255,255,0.15)"},
  "dark-elegant":{name:"다크 엘레건트",primary:"#C9A84C",secondary:"#8B6FBF",accent:"#E8D87F",background:"#0D0D0D",surface:"#1A1A1A",text:"#E8E8E8",textLight:"#888888",heading:"#F5F0E8",border:"#2E2E2E"},
  "nature-organic":{name:"네이처 오가닉",primary:"#4A6741",secondary:"#C07B54",accent:"#D4A843",background:"#F5F0E8",surface:"#EDE6D6",text:"#2E2A22",textLight:"#7A6E5F",heading:"#2E3D28",border:"#C8BDA8"},
  "tech-neon":{name:"테크 네온",primary:"#00FF9C",secondary:"#00BFFF",accent:"#FF2D78",background:"#080C14",surface:"#0D1520",text:"#C8E8FF",textLight:"#4A7A9B",heading:"#FFFFFF",border:"#0A2A40"},
  "pastel-soft":{name:"파스텔 소프트",primary:"#7B6FA0",secondary:"#E8857A",accent:"#5BAD8A",background:"#FDF8FF",surface:"#FFFFFF",text:"#3D3455",textLight:"#8E84A8",heading:"#4A3F6B",border:"#E5DCEF"},
  "bold-geometric":{name:"볼드 지오메트릭",primary:"#E52222",secondary:"#1A56CC",accent:"#F5C800",background:"#FFFFFF",surface:"#F2F2F2",text:"#111111",textLight:"#555555",heading:"#000000",border:"#CCCCCC"},
  "classic-academic":{name:"클래식 아카데믹",primary:"#2C1810",secondary:"#7B3B2A",accent:"#B8962E",background:"#F9F5EE",surface:"#EFE8D8",text:"#2C2018",textLight:"#6B5B4E",heading:"#1A0F08",border:"#C8B89A"},
  "scandinavian-hygge":{name:"스칸디나비안 휘게",primary:"#5C4A32",secondary:"#8B7355",accent:"#B5703A",background:"#F7F3EE",surface:"#EDE8E0",text:"#2E2520",textLight:"#7A6A5A",heading:"#1E1510",border:"#D4C8B8"},
  "medical-clinical":{name:"메디컬 클리니컬",primary:"#0077B6",secondary:"#48CAE4",accent:"#00B4D8",background:"#F8FDFF",surface:"#EDF6FA",text:"#1A2E3B",textLight:"#5A8A9F",heading:"#003D5C",border:"#C4DFE9"},
  "pharma-biotech":{name:"파마 바이오텍",primary:"#2D6A4F",secondary:"#40916C",accent:"#95D5B2",background:"#F0FFF4",surface:"#E2F5E9",text:"#1B3A2D",textLight:"#5A8A6F",heading:"#1B4332",border:"#B7D8C4"},
  "edu-classroom":{name:"에듀 클래스룸",primary:"#FF6B35",secondary:"#FFB563",accent:"#004E89",background:"#FFFBF5",surface:"#FFF3E6",text:"#2A1F14",textLight:"#8A7560",heading:"#1A1000",border:"#E8D5C0"},
  "edu-research":{name:"에듀 리서치",primary:"#1B4965",secondary:"#5FA8D3",accent:"#CAE9FF",background:"#F5F9FC",surface:"#E8F1F8",text:"#1A2B38",textLight:"#5A7A90",heading:"#0D2B3E",border:"#C0D6E4"},
  "startup-pitch":{name:"스타트업 피치",primary:"#7209B7",secondary:"#F72585",accent:"#4CC9F0",background:"#FFFFFF",surface:"#F8F0FF",text:"#1A0A2E",textLight:"#7A5A9E",heading:"#3A0066",border:"#E0CCF0"},
  "saas-product":{name:"SaaS 프로덕트",primary:"#3A0CA3",secondary:"#4361EE",accent:"#4CC9F0",background:"#F8F9FF",surface:"#EEF0FF",text:"#1A1A3E",textLight:"#6A6A9E",heading:"#1A0660",border:"#D0D4F0"},
  "marketing-campaign":{name:"마케팅 캠페인",primary:"#FF006E",secondary:"#FB5607",accent:"#FFBE0B",background:"#FFF8F0",surface:"#FFE8D6",text:"#2A1A10",textLight:"#8A6A50",heading:"#1A0800",border:"#E8D0B8"},
  "brand-storytelling":{name:"브랜드 스토리텔링",primary:"#2B2D42",secondary:"#8D99AE",accent:"#EF233C",background:"#EDF2F4",surface:"#FFFFFF",text:"#2B2D42",textLight:"#6B6D82",heading:"#14152A",border:"#C8CCD6"},
  "finance-trust":{name:"파이낸스 트러스트",primary:"#003049",secondary:"#023E7D",accent:"#0077B6",background:"#F5F7FA",surface:"#EBF0F5",text:"#1A2530",textLight:"#5A6A7A",heading:"#001A2C",border:"#C0CDD8"},
  "consulting-strategy":{name:"컨설팅 스트래터지",primary:"#14213D",secondary:"#FCA311",accent:"#E5E5E5",background:"#FFFFFF",surface:"#F8F8F8",text:"#14213D",textLight:"#5A6378",heading:"#0A1020",border:"#D0D0D0"},
  "gov-accessible":{name:"거버먼트 액세서블",primary:"#1B3A4B",secondary:"#455A64",accent:"#0288D1",background:"#FAFAFA",surface:"#F0F0F0",text:"#1A1A1A",textLight:"#555555",heading:"#0D1B24",border:"#C0C0C0"},
  "ngo-impact":{name:"NGO 임팩트",primary:"#606C38",secondary:"#DDA15E",accent:"#BC6C25",background:"#FEFAE0",surface:"#F5EDCC",text:"#2A2510",textLight:"#7A7050",heading:"#3A3A1A",border:"#D8CCAA"},
  "creative-portfolio":{name:"크리에이티브 포트폴리오",primary:"#0D0D0D",secondary:"#FF4500",accent:"#FFD700",background:"#FFFFFF",surface:"#F5F5F5",text:"#0D0D0D",textLight:"#555555",heading:"#000000",border:"#1A1A1A"},
  "retail-lifestyle":{name:"리테일 라이프스타일",primary:"#E07A5F",secondary:"#F2CC8F",accent:"#81B29A",background:"#F4F1DE",surface:"#FEFCF3",text:"#2A2418",textLight:"#7A6E58",heading:"#1A1408",border:"#D8CCAA"},
  "ai-futuristic":{name:"AI 퓨처리스틱",primary:"#6C63FF",secondary:"#00F5D4",accent:"#FF6B9D",background:"#0A0E27",surface:"rgba(108,99,255,0.10)",text:"#D0D4FF",textLight:"#6A6EAA",heading:"#FFFFFF",border:"rgba(108,99,255,0.20)"}
};

const groups = {
  "비즈니스":["minimal-clean","corporate-modern","finance-trust","consulting-strategy"],
  "모던":["gradient-flow","dark-elegant","bold-geometric","brand-storytelling"],
  "테크":["tech-neon","saas-product","ai-futuristic"],
  "교육":["edu-classroom","edu-research","classic-academic"],
  "의료":["medical-clinical","pharma-biotech"],
  "공공":["gov-accessible","ngo-impact"],
  "크리에이티브":["creative-portfolio","startup-pitch","marketing-campaign"],
  "라이프스타일":["nature-organic","pastel-soft","scandinavian-hygge","retail-lifestyle"]
};

const selectA = document.getElementById("selectA");
const selectB = document.getElementById("selectB");
const frameA = document.getElementById("frameA");
const frameB = document.getElementById("frameB");
const labelA = document.getElementById("labelA");
const labelB = document.getElementById("labelB");
let currentSlide = "cover";

function populateSelect(sel) {
  Object.entries(groups).forEach(([group, ids]) => {
    const optgroup = document.createElement("optgroup");
    optgroup.label = group;
    ids.forEach(id => {
      const opt = document.createElement("option");
      opt.value = id;
      opt.textContent = themes[id].name;
      optgroup.appendChild(opt);
    });
    sel.appendChild(optgroup);
  });
}

populateSelect(selectA);
populateSelect(selectB);
selectA.value = "minimal-clean";
selectB.value = "corporate-modern";

function updateScale() {
  document.querySelectorAll(".iframe-container").forEach(container => {
    const scale = container.offsetWidth / 960;
    const iframe = container.querySelector("iframe");
    if (iframe) {
      iframe.style.transform = `scale(${scale})`;
    }
  });
}

function loadFrames() {
  const idA = selectA.value, idB = selectB.value;
  frameA.src = "styles/" + idA + ".html#" + currentSlide;
  frameB.src = "styles/" + idB + ".html#" + currentSlide;
  labelA.textContent = themes[idA].name;
  labelB.textContent = themes[idB].name;
  updatePaletteTable(idA, idB);
  setTimeout(updateScale, 100);
}

function updatePaletteTable(idA, idB) {
  const a = themes[idA], b = themes[idB];
  const fields = ["primary","secondary","accent","background","surface","text","textLight","heading","border"];
  const tbody = document.querySelector("#paletteTable tbody");
  tbody.innerHTML = fields.map(f => `
    <tr>
      <td>${f}</td>
      <td><div class="color-cell"><span class="color-dot" style="background:${a[f]}"></span>${a[f]}</div></td>
      <td><div class="color-cell"><span class="color-dot" style="background:${b[f]}"></span>${b[f]}</div></td>
    </tr>
  `).join("");
}

selectA.addEventListener("change", loadFrames);
selectB.addEventListener("change", loadFrames);

document.querySelectorAll("#tabs button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("#tabs button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentSlide = btn.dataset.slide;
    loadFrames();
  });
});

window.addEventListener("resize", updateScale);
loadFrames();
</script>
</body>
</html>
