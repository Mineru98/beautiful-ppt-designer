<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 퓨처리스틱 / AI Futuristic - Preview</title>
  <link rel="stylesheet" href="../assets/preview.css">

  <style>
    :root {
      --primary:    #6C63FF;
      --secondary:  #00F5D4;
      --accent:     #FF6B9D;
      --bg:         #0A0E27;
      --surface:    rgba(108,99,255,0.10);
      --text:       #D0D4FF;
      --text-light: #6A6EAA;
      --heading:    #FFFFFF;
      --border:     rgba(108,99,255,0.20);
    }
  </style>

  <!-- AI-Futuristic: Neural Space archetype -->
  <style>
    /* ----------------------------------------------------------------
       NEURAL SPACE archetype
       Deep cosmic navy background. Neural-network connecting dots.
       Purple glow box-shadow. Glassmorphism floating cards.
       Sci-fi, AI frontier aesthetic. No JavaScript.
    ---------------------------------------------------------------- */

    /* Override body background for dark theme */
    body {
      background: #060810;
    }

    /* Override nav for dark theme */
    .preview-nav a {
      background: rgba(108,99,255,0.15);
      border-color: rgba(108,99,255,0.30);
      color: var(--text);
    }

    .preview-nav a:hover {
      background: var(--primary);
      color: #fff;
    }

    /* --- Shared: neural dot nodes (pure CSS, positioned absolutely) --- */
    .nn-dot {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
      opacity: 0.6;
    }

    .nn-dot.cyan { background: var(--secondary); opacity: 0.5; }
    .nn-dot.pink { background: var(--accent); opacity: 0.5; }

    /* Connecting lines via thin pseudo-borders */
    .nn-line {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(108,99,255,0.3), transparent);
      transform-origin: left center;
    }

    /* --- COVER --- */
    #cover {
      background: var(--bg);
      overflow: hidden;
    }

    /* Radial glow center */
    #cover::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 30%;
      transform: translate(-50%, -50%);
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(108,99,255,0.18) 0%, transparent 70%);
      z-index: 0;
    }

    /* Top accent gradient line */
    #cover .ai-top-line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
      z-index: 5;
    }

    /* Main content */
    #cover .ai-cover-content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 64px;
      z-index: 4;
    }

    #cover .ai-cover-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--secondary);
      margin-bottom: 16px;
    }

    #cover .ai-cover-title {
      font-size: 44px;
      font-weight: 800;
      color: var(--heading);
      line-height: 1.1;
      letter-spacing: -1px;
      margin-bottom: 14px;
      text-shadow: 0 0 40px rgba(108,99,255,0.5);
    }

    #cover .ai-cover-title span {
      color: var(--primary);
    }

    #cover .ai-cover-subtitle {
      font-size: 18px;
      font-weight: 300;
      color: var(--text);
      margin-bottom: 36px;
      letter-spacing: 0.5px;
    }

    #cover .ai-cover-meta {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    #cover .ai-glass-pill {
      background: rgba(108,99,255,0.15);
      border: 1px solid rgba(108,99,255,0.35);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      box-shadow: 0 0 12px rgba(108,99,255,0.2);
    }

    /* Right neural graphic */
    #cover .ai-neural-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: 340px;
      height: 100%;
      z-index: 2;
    }

    /* Neural nodes - positioned statically */
    #cover .ai-neural-panel .nn-dot:nth-child(1) { top: 60px; right: 100px; width: 8px; height: 8px; }
    #cover .ai-neural-panel .nn-dot:nth-child(2) { top: 120px; right: 180px; width: 5px; height: 5px; }
    #cover .ai-neural-panel .nn-dot:nth-child(3) { top: 200px; right: 80px; width: 10px; height: 10px; background: var(--secondary); opacity: 0.7; }
    #cover .ai-neural-panel .nn-dot:nth-child(4) { top: 280px; right: 160px; width: 6px; height: 6px; }
    #cover .ai-neural-panel .nn-dot:nth-child(5) { top: 350px; right: 60px; width: 8px; height: 8px; background: var(--accent); opacity: 0.6; }
    #cover .ai-neural-panel .nn-dot:nth-child(6) { top: 420px; right: 140px; width: 5px; height: 5px; }
    #cover .ai-neural-panel .nn-dot:nth-child(7) { top: 160px; right: 40px; width: 12px; height: 12px; box-shadow: 0 0 8px rgba(108,99,255,0.8); }
    #cover .ai-neural-panel .nn-dot:nth-child(8) { top: 320px; right: 220px; width: 7px; height: 7px; background: var(--secondary); }

    /* Lines connecting neural nodes */
    #cover .ai-nn-line-1 {
      position: absolute;
      top: 63px; right: 108px;
      width: 90px; height: 1px;
      background: linear-gradient(90deg, rgba(108,99,255,0.4), transparent);
      transform: rotate(35deg);
    }
    #cover .ai-nn-line-2 {
      position: absolute;
      top: 123px; right: 88px;
      width: 110px; height: 1px;
      background: linear-gradient(90deg, rgba(0,245,212,0.3), transparent);
      transform: rotate(-25deg);
    }
    #cover .ai-nn-line-3 {
      position: absolute;
      top: 203px; right: 90px;
      width: 95px; height: 1px;
      background: linear-gradient(90deg, rgba(108,99,255,0.4), transparent);
      transform: rotate(48deg);
    }
    #cover .ai-nn-line-4 {
      position: absolute;
      top: 283px; right: 70px;
      width: 120px; height: 1px;
      background: linear-gradient(90deg, rgba(255,107,157,0.3), transparent);
      transform: rotate(-38deg);
    }
    #cover .ai-nn-line-5 {
      position: absolute;
      top: 353px; right: 70px;
      width: 100px; height: 1px;
      background: linear-gradient(90deg, rgba(108,99,255,0.4), transparent);
      transform: rotate(42deg);
    }

    /* --- CONTENT --- */
    #content {
      background: var(--bg);
      overflow: hidden;
    }

    #content::before {
      content: "";
      position: absolute;
      top: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
      z-index: 0;
    }

    #content .ai-top-line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
      z-index: 5;
    }

    #content .ai-content-inner {
      position: absolute;
      top: 2px;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 28px 52px;
      z-index: 2;
    }

    #content .ai-content-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    #content .ai-heading-bracket {
      font-size: 22px;
      font-weight: 300;
      color: var(--primary);
    }

    #content .ai-content-heading {
      font-size: 24px;
      font-weight: 700;
      color: var(--heading);
      letter-spacing: -0.3px;
    }

    #content .ai-content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    #content .ai-card {
      background: rgba(108,99,255,0.08);
      border: 1px solid rgba(108,99,255,0.25);
      border-radius: 10px;
      padding: 16px 18px;
      box-shadow: 0 0 20px rgba(108,99,255,0.12), inset 0 0 20px rgba(108,99,255,0.05);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    #content .ai-card-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
      box-shadow: 0 0 6px currentColor;
    }

    #content .ai-card:nth-child(1) .ai-card-dot { background: var(--primary); color: var(--primary); }
    #content .ai-card:nth-child(2) .ai-card-dot { background: var(--secondary); color: var(--secondary); }
    #content .ai-card:nth-child(3) .ai-card-dot { background: var(--accent); color: var(--accent); }
    #content .ai-card:nth-child(4) .ai-card-dot { background: var(--primary); color: var(--primary); }

    #content .ai-card-text {
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.5;
    }

    /* Floating neural dots in content */
    #content .ai-float-dot-1 { position: absolute; bottom: 40px; left: 30px; width: 5px; height: 5px; border-radius: 50%; background: var(--primary); opacity: 0.4; z-index: 1; }
    #content .ai-float-dot-2 { position: absolute; bottom: 80px; left: 60px; width: 3px; height: 3px; border-radius: 50%; background: var(--secondary); opacity: 0.5; z-index: 1; }
    #content .ai-float-dot-3 { position: absolute; top: 80px; right: 40px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: 0.3; z-index: 1; }

    /* --- DATA --- */
    #data {
      background: var(--bg);
      overflow: hidden;
    }

    #data::before {
      content: "";
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,245,212,0.08) 0%, transparent 70%);
      z-index: 0;
    }

    #data .ai-top-line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
      z-index: 5;
    }

    #data .ai-data-inner {
      position: absolute;
      top: 2px;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 24px 52px;
      display: flex;
      flex-direction: column;
      z-index: 2;
    }

    #data .ai-data-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    #data .ai-data-heading {
      font-size: 24px;
      font-weight: 700;
      color: var(--heading);
    }

    #data .ai-data-tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--secondary);
      border: 1px solid rgba(0,245,212,0.4);
      border-radius: 4px;
      padding: 3px 10px;
    }

    #data .ai-chart {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
    }

    #data .ai-bar-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #data .ai-bar-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-light);
      width: 40px;
      flex-shrink: 0;
      text-align: right;
      letter-spacing: 1px;
    }

    #data .ai-bar-track {
      flex: 1;
      height: 34px;
      background: rgba(108,99,255,0.08);
      border: 1px solid rgba(108,99,255,0.20);
      border-radius: 4px;
      overflow: hidden;
    }

    #data .ai-bar-fill {
      height: 100%;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 12px;
    }

    #data .ai-bar-fill-1 {
      background: linear-gradient(90deg, rgba(108,99,255,0.5), rgba(108,99,255,0.8));
      box-shadow: 0 0 12px rgba(108,99,255,0.3);
    }
    #data .ai-bar-fill-2 {
      background: linear-gradient(90deg, rgba(108,99,255,0.5), rgba(0,245,212,0.7));
      box-shadow: 0 0 12px rgba(0,245,212,0.25);
    }
    #data .ai-bar-fill-3 {
      background: linear-gradient(90deg, rgba(0,245,212,0.5), rgba(0,245,212,0.8));
      box-shadow: 0 0 12px rgba(0,245,212,0.3);
    }
    #data .ai-bar-fill-4 {
      background: linear-gradient(90deg, rgba(108,99,255,0.6), rgba(255,107,157,0.8));
      box-shadow: 0 0 16px rgba(255,107,157,0.4);
    }

    #data .ai-bar-fill span {
      font-size: 13px;
      font-weight: 700;
      color: #FFFFFF;
      text-shadow: 0 0 8px rgba(255,255,255,0.5);
    }

    #data .ai-bar-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-light);
      width: 56px;
      flex-shrink: 0;
    }

    /* Floating neural dots on data */
    #data .ai-float-dot-a { position: absolute; top: 50px; right: 30px; width: 5px; height: 5px; border-radius: 50%; background: var(--primary); opacity: 0.5; z-index: 1; box-shadow: 0 0 6px rgba(108,99,255,0.8); }
    #data .ai-float-dot-b { position: absolute; top: 90px; right: 70px; width: 3px; height: 3px; border-radius: 50%; background: var(--secondary); opacity: 0.4; z-index: 1; }
    #data .ai-float-dot-c { position: absolute; bottom: 60px; right: 50px; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); opacity: 0.4; z-index: 1; box-shadow: 0 0 8px rgba(255,107,157,0.6); }
    #data .ai-float-dot-d { position: absolute; bottom: 40px; right: 100px; width: 4px; height: 4px; border-radius: 50%; background: var(--primary); opacity: 0.5; z-index: 1; }
  </style>
</head>
<body>

  <nav class="preview-nav">
    <a href="#cover">표지 Cover</a>
    <a href="#content">내용 Content</a>
    <a href="#data">데이터 Data</a>
  </nav>

  <div class="slide-wrapper">

    <!-- SECTION 1: COVER -->
    <section class="slide-section" id="cover">
      <div class="ai-top-line"></div>

      <div class="ai-neural-panel">
        <div class="nn-dot"></div>
        <div class="nn-dot cyan"></div>
        <div class="nn-dot"></div>
        <div class="nn-dot"></div>
        <div class="nn-dot pink"></div>
        <div class="nn-dot"></div>
        <div class="nn-dot"></div>
        <div class="nn-dot cyan"></div>
        <div class="ai-nn-line-1"></div>
        <div class="ai-nn-line-2"></div>
        <div class="ai-nn-line-3"></div>
        <div class="ai-nn-line-4"></div>
        <div class="ai-nn-line-5"></div>
      </div>

      <div class="ai-cover-content">
        <p class="ai-cover-eyebrow">// Annual Report 2026</p>
        <h1 class="ai-cover-title">
          2026 연간<br>
          <span>사업 보고서</span>
        </h1>
        <p class="ai-cover-subtitle">성장과 혁신의 여정</p>
        <div class="ai-cover-meta">
          <span class="ai-glass-pill">홍길동 / 전략기획팀</span>
          <span class="ai-glass-pill">2026년 3월</span>
        </div>
      </div>
    </section>

    <!-- SECTION 2: CONTENT -->
    <section class="slide-section" id="content">
      <div class="ai-top-line"></div>
      <div class="ai-float-dot-1"></div>
      <div class="ai-float-dot-2"></div>
      <div class="ai-float-dot-3"></div>

      <div class="ai-content-inner">
        <div class="ai-content-header">
          <span class="ai-heading-bracket">[</span>
          <h2 class="ai-content-heading">핵심 성과 요약</h2>
          <span class="ai-heading-bracket">]</span>
        </div>
        <div class="ai-content-grid">
          <div class="ai-card">
            <div class="ai-card-dot"></div>
            <span class="ai-card-text">매출 전년 대비 32% 성장 달성</span>
          </div>
          <div class="ai-card">
            <div class="ai-card-dot"></div>
            <span class="ai-card-text">신규 고객 1,200개사 확보</span>
          </div>
          <div class="ai-card">
            <div class="ai-card-dot"></div>
            <span class="ai-card-text">직원 만족도 4.5/5.0 기록</span>
          </div>
          <div class="ai-card">
            <div class="ai-card-dot"></div>
            <span class="ai-card-text">해외 시장 3개국 진출 완료</span>
          </div>
        </div>
      </div>
    </section>

    <!-- SECTION 3: DATA -->
    <section class="slide-section" id="data">
      <div class="ai-top-line"></div>
      <div class="ai-float-dot-a"></div>
      <div class="ai-float-dot-b"></div>
      <div class="ai-float-dot-c"></div>
      <div class="ai-float-dot-d"></div>

      <div class="ai-data-inner">
        <div class="ai-data-header">
          <h2 class="ai-data-heading">분기별 실적 추이</h2>
          <span class="ai-data-tag">2026 Q1–Q4</span>
        </div>
        <div class="ai-chart">
          <div class="ai-bar-row">
            <div class="ai-bar-label">Q1</div>
            <div class="ai-bar-track">
              <div class="ai-bar-fill ai-bar-fill-1" style="width:40%"><span>2.4억</span></div>
            </div>
            <div class="ai-bar-value">40%</div>
          </div>
          <div class="ai-bar-row">
            <div class="ai-bar-label">Q2</div>
            <div class="ai-bar-track">
              <div class="ai-bar-fill ai-bar-fill-2" style="width:52%"><span>3.1억</span></div>
            </div>
            <div class="ai-bar-value">52%</div>
          </div>
          <div class="ai-bar-row">
            <div class="ai-bar-label">Q3</div>
            <div class="ai-bar-track">
              <div class="ai-bar-fill ai-bar-fill-3" style="width:63%"><span>3.8억</span></div>
            </div>
            <div class="ai-bar-value">63%</div>
          </div>
          <div class="ai-bar-row">
            <div class="ai-bar-label">Q4</div>
            <div class="ai-bar-track">
              <div class="ai-bar-fill ai-bar-fill-4" style="width:75%"><span>4.5억</span></div>
            </div>
            <div class="ai-bar-value">75%</div>
          </div>
        </div>
      </div>
    </section>

  </div><!-- /.slide-wrapper -->

</body>
</html>
