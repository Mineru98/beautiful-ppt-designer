<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>볼드 지오메트릭 / Bold Geometric - Preview</title>
  <link rel="stylesheet" href="../assets/preview.css">

  <style>
    :root {
      --primary:    #E52222;
      --secondary:  #1A56CC;
      --accent:     #F5C800;
      --bg:         #FFFFFF;
      --surface:    #F2F2F2;
      --text:       #111111;
      --text-light: #555555;
      --heading:    #000000;
      --border:     #CCCCCC;
    }
  </style>

  <!-- Bold-Geometric: Diagonal Slash archetype -->
  <style>
    /* ----------------------------------------------------------------
       DIAGONAL SLASH archetype
       Diagonal dividers using CSS clip-path / skewed elements.
       Overlapping colored blocks. Large bold type (48px+ titles).
       Primary colors in big geometric shapes. Bauhaus energy.
    ---------------------------------------------------------------- */

    body {
      background: #DDDDDD;
    }

    .preview-nav a {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
      border-radius: 0;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 11px;
    }

    .preview-nav a:hover {
      background: var(--primary);
      color: #fff;
    }

    .slide-section {
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans CJK KR", "Arial Black", "Segoe UI", sans-serif;
    }

    /* ========== COVER ========== */
    #cover {
      display: none;
      background: #FFFFFF;
      overflow: hidden;
    }

    /* Large red diagonal block - left side */
    #cover .geo-red {
      position: absolute;
      top: 0;
      left: 0;
      width: 460px;
      height: 100%;
      background: var(--primary);
      clip-path: polygon(0 0, 100% 0, 80% 100%, 0 100%);
      z-index: 1;
    }

    /* Yellow accent triangle - top right */
    #cover .geo-yellow {
      position: absolute;
      top: 0;
      right: 0;
      width: 200px;
      height: 200px;
      background: var(--accent);
      clip-path: polygon(100% 0, 0 0, 100% 100%);
      z-index: 2;
    }

    /* Blue bottom strip */
    #cover .geo-blue {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 560px;
      height: 80px;
      background: var(--secondary);
      clip-path: polygon(10% 0, 100% 0, 100% 100%, 0 100%);
      z-index: 2;
    }

    #cover .cover-body {
      position: absolute;
      top: 0;
      left: 0;
      width: 420px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 48px 0 44px;
      z-index: 3;
    }

    #cover .cover-tag {
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-bottom: 12px;
    }

    #cover .cover-title {
      font-size: 40px;
      font-weight: 900;
      color: #FFFFFF;
      line-height: 1.1;
      margin-bottom: 14px;
      letter-spacing: -1px;
    }

    #cover .cover-subtitle {
      font-size: 16px;
      font-weight: 400;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.5px;
    }

    #cover .cover-right {
      position: absolute;
      right: 0;
      top: 0;
      width: 540px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 3;
      padding-bottom: 60px;
    }

    #cover .big-number {
      font-size: 120px;
      font-weight: 900;
      color: rgba(0,0,0,0.06);
      line-height: 1;
      letter-spacing: -4px;
      user-select: none;
    }

    #cover .cover-footer {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 560px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      z-index: 4;
      clip-path: polygon(10% 0, 100% 0, 100% 100%, 0 100%);
    }

    #cover .cover-author {
      font-size: 13px;
      font-weight: 700;
      color: #ffffff;
      padding-left: 30px;
    }

    #cover .cover-date {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
    }

    /* ========== CONTENT ========== */
    #content {
      display: none;
      background: #FFFFFF;
    }

    /* Left thick vertical bar */
    #content .geo-sidebar-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 12px;
      height: 100%;
      background: var(--primary);
      z-index: 2;
    }

    /* Diagonal header block */
    #content .geo-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 88px;
      background: var(--heading);
      clip-path: polygon(0 0, 100% 0, 100% 60%, 0 100%);
      z-index: 1;
    }

    #content .content-heading {
      position: absolute;
      top: 0;
      left: 60px;
      height: 64px;
      display: flex;
      align-items: center;
      z-index: 3;
    }

    #content .content-heading h2 {
      font-size: 24px;
      font-weight: 900;
      color: #FFFFFF;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #content .content-body {
      position: absolute;
      top: 88px;
      left: 0;
      right: 0;
      bottom: 0;
      display: grid;
      grid-template-columns: 3fr 2fr;
      z-index: 2;
    }

    #content .content-main {
      padding: 24px 32px 24px 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0;
    }

    #content .bullet-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    #content .bullet-list li {
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      padding: 12px 0 12px 32px;
      position: relative;
      border-bottom: 1px solid var(--border);
      line-height: 1.4;
    }

    #content .bullet-list li:last-child {
      border-bottom: none;
    }

    #content .bullet-list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      background: var(--accent);
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    }

    #content .content-stats {
      background: var(--surface);
      border-left: 3px solid var(--accent);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 0;
      justify-content: space-around;
    }

    .geo-stat {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .geo-stat:last-child {
      border-bottom: none;
    }

    .geo-stat .sc-value {
      font-size: 28px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
    }

    .geo-stat .sc-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-light);
      margin-top: 2px;
    }

    /* ========== DATA ========== */
    #data {
      display: none;
      background: #FFFFFF;
    }

    #data .geo-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 88px;
      background: var(--secondary);
      clip-path: polygon(0 0, 100% 0, 100% 60%, 0 100%);
      z-index: 1;
    }

    #data .geo-sidebar-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 12px;
      height: 100%;
      background: var(--accent);
      z-index: 2;
    }

    #data .data-heading {
      position: absolute;
      top: 0;
      left: 60px;
      height: 64px;
      display: flex;
      align-items: center;
      z-index: 3;
    }

    #data .data-heading h2 {
      font-size: 24px;
      font-weight: 900;
      color: #FFFFFF;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #data .data-body {
      position: absolute;
      top: 88px;
      left: 60px;
      right: 40px;
      bottom: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      z-index: 2;
    }

    #data .bar-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #data .bar-label {
      font-size: 14px;
      font-weight: 900;
      color: var(--heading);
      width: 36px;
      flex-shrink: 0;
      text-align: right;
    }

    #data .bar-track {
      flex: 1;
      height: 38px;
      background: var(--surface);
      overflow: hidden;
      border-left: 3px solid var(--border);
    }

    #data .bar-fill {
      height: 100%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 14px;
      clip-path: polygon(0 0, 100% 0, 96% 100%, 0 100%);
    }

    #data .bar-fill span {
      font-size: 13px;
      font-weight: 900;
      color: #fff;
    }

    #data .bar-fill.accent {
      background: var(--secondary);
    }

    #data .bar-value {
      font-size: 16px;
      font-weight: 900;
      color: var(--text);
      width: 52px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <nav class="preview-nav">
    <a href="#cover">표지 Cover</a>
    <a href="#content">내용 Content</a>
    <a href="#data">데이터 Data</a>
  </nav>

  <div class="slide-wrapper">

    <!-- COVER -->
    <section class="slide-section" id="cover">
      <div class="geo-red"></div>
      <div class="geo-yellow"></div>
      <div class="geo-blue"></div>

      <div class="cover-body">
        <p class="cover-tag">Annual Report 2026</p>
        <h1 class="cover-title">2026 연간 사업 보고서</h1>
        <p class="cover-subtitle">성장과 혁신의 여정</p>
      </div>

      <div class="cover-right">
        <div class="big-number">26</div>
      </div>

      <div class="cover-footer">
        <span class="cover-author">홍길동 / 전략기획팀</span>
        <span class="cover-date">2026년 3월</span>
      </div>
    </section>

    <!-- CONTENT -->
    <section class="slide-section" id="content">
      <div class="geo-sidebar-bar"></div>
      <div class="geo-header"></div>

      <div class="content-heading">
        <h2>핵심 성과 요약</h2>
      </div>

      <div class="content-body">
        <div class="content-main">
          <ul class="bullet-list">
            <li>매출 전년 대비 32% 성장 달성</li>
            <li>신규 고객 1,200개사 확보</li>
            <li>직원 만족도 4.5/5.0 기록</li>
            <li>해외 시장 3개국 진출 완료</li>
          </ul>
        </div>

        <div class="content-stats">
          <div class="geo-stat">
            <div class="sc-value">+32%</div>
            <div class="sc-label">매출 성장</div>
          </div>
          <div class="geo-stat">
            <div class="sc-value">1,200</div>
            <div class="sc-label">신규 고객</div>
          </div>
          <div class="geo-stat">
            <div class="sc-value">3개국</div>
            <div class="sc-label">해외 진출</div>
          </div>
        </div>
      </div>
    </section>

    <!-- DATA -->
    <section class="slide-section" id="data">
      <div class="geo-sidebar-bar"></div>
      <div class="geo-header"></div>

      <div class="data-heading">
        <h2>분기별 실적 추이</h2>
      </div>

      <div class="data-body">

        <div class="bar-row">
          <div class="bar-label">Q1</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:40%">
              <span>2.4억</span>
            </div>
          </div>
          <div class="bar-value">40%</div>
        </div>

        <div class="bar-row">
          <div class="bar-label">Q2</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:52%">
              <span>3.1억</span>
            </div>
          </div>
          <div class="bar-value">52%</div>
        </div>

        <div class="bar-row">
          <div class="bar-label">Q3</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:63%">
              <span>3.8억</span>
            </div>
          </div>
          <div class="bar-value">63%</div>
        </div>

        <div class="bar-row">
          <div class="bar-label">Q4</div>
          <div class="bar-track">
            <div class="bar-fill accent" style="width:75%">
              <span>4.5억</span>
            </div>
          </div>
          <div class="bar-value">75%</div>
        </div>

      </div>
    </section>

  </div>

</body>
</html>
