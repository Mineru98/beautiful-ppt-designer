<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>다크 엘레간트 / Dark Elegant - Preview</title>
  <link rel="stylesheet" href="../assets/preview.css">

  <!-- Dark-Elegant color overrides -->
  <style>
    :root {
      --primary:    #C9A84C;
      --secondary:  #8B6FBF;
      --accent:     #E8D87F;
      --bg:         #0D0D0D;
      --surface:    #1A1A1A;
      --text:       #E8E8E8;
      --text-light: #888888;
      --heading:    #F5F0E8;
      --border:     #2E2E2E;
    }
  </style>

  <!-- Dark-Elegant: Spotlight archetype -->
  <style>
    /* ----------------------------------------------------------------
       SPOTLIGHT archetype
       Dark background throughout. Gold glowing accents (box-shadow).
       Centered focal point on cover. Metallic gold line borders.
       Thin gold lines as dividers. Premium feel.
    ---------------------------------------------------------------- */

    .slide-section {
      background: var(--bg) !important;
    }

    /* Subtle noise texture via repeating-conic-gradient trick */
    .slide-section::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ---- COVER ---- */
    #cover {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #cover .cover-spotlight {
      position: absolute;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.12) 0%, transparent 65%);
      pointer-events: none;
      z-index: 1;
    }

    #cover .cover-inner {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 640px;
    }

    /* Gold monogram / icon placeholder */
    #cover .cover-emblem {
      width: 48px;
      height: 48px;
      border: 1px solid var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      box-shadow: 0 0 20px rgba(201,168,76,0.35), inset 0 0 10px rgba(201,168,76,0.1);
    }

    #cover .cover-emblem::after {
      content: "";
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 10px rgba(201,168,76,0.8);
    }

    /* Gold top line */
    #cover .cover-gold-line {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      margin-bottom: 28px;
      box-shadow: 0 0 6px rgba(201,168,76,0.5);
    }

    #cover .cover-tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 18px;
      opacity: 0.9;
    }

    #cover .cover-title {
      font-size: 36px;
      font-weight: 700;
      color: var(--heading);
      line-height: 1.25;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
    }

    #cover .cover-subtitle {
      font-size: 16px;
      font-weight: 300;
      color: var(--text-light);
      letter-spacing: 1px;
      margin-bottom: 36px;
    }

    /* Gold divider */
    #cover .cover-gold-divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      box-shadow: 0 0 6px rgba(201,168,76,0.4);
      margin-bottom: 24px;
    }

    #cover .cover-meta {
      display: flex;
      gap: 28px;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    #cover .cover-author {
      color: var(--text);
      font-weight: 500;
    }

    #cover .cover-date {
      color: var(--text-light);
    }

    /* ---- CONTENT ---- */
    #content {
      padding: 44px 64px 40px;
      display: flex;
      flex-direction: column;
    }

    #content .content-inner {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    #content .slide-heading {
      font-size: 20px;
      font-weight: 700;
      color: var(--heading);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    /* Gold glow divider under heading */
    #content .heading-line {
      height: 1px;
      background: linear-gradient(90deg, var(--primary), rgba(201,168,76,0.2) 70%, transparent);
      box-shadow: 0 0 8px rgba(201,168,76,0.3);
      margin-bottom: 28px;
    }

    #content .bullet-list {
      list-style: none;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      justify-content: center;
    }

    #content .bullet-list li {
      font-size: 16px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border: 1px solid var(--border);
      border-left: 2px solid var(--primary);
      background: rgba(201,168,76,0.03);
      position: relative;
    }

    #content .bullet-list li::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 8px rgba(201,168,76,0.7);
      flex-shrink: 0;
    }

    /* ---- DATA ---- */
    #data {
      padding: 44px 64px 40px;
      display: flex;
      flex-direction: column;
    }

    #data .data-inner {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    #data .slide-heading {
      font-size: 20px;
      font-weight: 700;
      color: var(--heading);
      margin-bottom: 6px;
    }

    #data .heading-line {
      height: 1px;
      background: linear-gradient(90deg, var(--primary), rgba(201,168,76,0.2) 70%, transparent);
      box-shadow: 0 0 8px rgba(201,168,76,0.3);
      margin-bottom: 28px;
    }

    #data .bar-chart {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      gap: 10px;
    }

    #data .bar-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #data .bar-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      width: 28px;
      flex-shrink: 0;
      text-align: right;
      letter-spacing: 0.5px;
    }

    #data .bar-track {
      flex: 1;
      height: 34px;
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
    }

    #data .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, rgba(201,168,76,0.6) 0%, var(--primary) 100%);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 12px;
      position: relative;
    }

    #data .bar-fill.accent {
      background: linear-gradient(90deg, var(--secondary) 0%, var(--primary) 50%, var(--accent) 100%);
      box-shadow: 0 0 16px rgba(232,216,127,0.25);
    }

    #data .bar-fill span {
      font-size: 12px;
      font-weight: 700;
      color: #000;
    }

    /* Glow effect on accent bar end */
    #data .bar-fill.accent::after {
      content: "";
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--accent);
      box-shadow: 0 0 12px rgba(232,216,127,0.9), 0 0 4px rgba(232,216,127,0.6);
    }

    #data .bar-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      width: 44px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- Tab navigation -->
  <nav class="preview-nav">
    <a href="#cover">표지 Cover</a>
    <a href="#content">내용 Content</a>
    <a href="#data">데이터 Data</a>
  </nav>

  <div class="slide-wrapper">

    <!-- ============================================================
         SECTION 1: COVER — spotlight centered, gold glow
         ============================================================ -->
    <section class="slide-section" id="cover">
      <div class="cover-spotlight"></div>
      <div class="cover-inner">
        <div class="cover-emblem"></div>
        <div class="cover-gold-line"></div>
        <p class="cover-tag">Annual Report · 2026</p>
        <h1 class="cover-title">2026 연간 사업 보고서</h1>
        <p class="cover-subtitle">성장과 혁신의 여정</p>
        <div class="cover-gold-divider"></div>
        <div class="cover-meta">
          <span class="cover-author">홍길동 / 전략기획팀</span>
          <span class="cover-date">2026년 3월</span>
        </div>
      </div>
    </section>

    <!-- ============================================================
         SECTION 2: CONTENT — gold border bullets on dark bg
         ============================================================ -->
    <section class="slide-section" id="content">
      <div class="content-inner">
        <h2 class="slide-heading">핵심 성과 요약</h2>
        <div class="heading-line"></div>
        <ul class="bullet-list">
          <li>매출 전년 대비 32% 성장 달성</li>
          <li>신규 고객 1,200개사 확보</li>
          <li>직원 만족도 4.5/5.0 기록</li>
          <li>해외 시장 3개국 진출 완료</li>
        </ul>
      </div>
    </section>

    <!-- ============================================================
         SECTION 3: DATA — metallic gold bars on dark bg
         ============================================================ -->
    <section class="slide-section" id="data">
      <div class="data-inner">
        <h2 class="slide-heading">분기별 실적 추이</h2>
        <div class="heading-line"></div>
        <div class="bar-chart">

          <div class="bar-row">
            <div class="bar-label">Q1</div>
            <div class="bar-track">
              <div class="bar-fill" style="width: 40%"><span>2.4억</span></div>
            </div>
            <div class="bar-value">40%</div>
          </div>

          <div class="bar-row">
            <div class="bar-label">Q2</div>
            <div class="bar-track">
              <div class="bar-fill" style="width: 52%"><span>3.1억</span></div>
            </div>
            <div class="bar-value">52%</div>
          </div>

          <div class="bar-row">
            <div class="bar-label">Q3</div>
            <div class="bar-track">
              <div class="bar-fill" style="width: 63%"><span>3.8억</span></div>
            </div>
            <div class="bar-value">63%</div>
          </div>

          <div class="bar-row">
            <div class="bar-label">Q4</div>
            <div class="bar-track">
              <div class="bar-fill accent" style="width: 75%"><span>4.5억</span></div>
            </div>
            <div class="bar-value">75%</div>
          </div>

        </div>
      </div>
    </section>

  </div><!-- /.slide-wrapper -->

</body>
</html>
