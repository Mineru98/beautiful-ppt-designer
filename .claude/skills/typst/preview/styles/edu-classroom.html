<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>에듀 클래스룸 / Edu Classroom - Preview</title>
  <link rel="stylesheet" href="../assets/preview.css">

  <style>
    :root {
      --primary:    #FF6B35;
      --secondary:  #FFB563;
      --accent:     #004E89;
      --bg:         #FFFBF5;
      --surface:    #FFF3E6;
      --text:       #2A1F14;
      --text-light: #8A7560;
      --heading:    #1A1000;
      --border:     #E8D5C0;
    }
  </style>

  <style>
    /* ----------------------------------------------------------------
       EDU CLASSROOM archetype
       Chalkboard Hero — Bold orange header. CSS counter numbered list.
       Fun accent shapes. Energetic, classroom feel.
    ---------------------------------------------------------------- */

    /* --- COVER --- */
    #cover {
      background: var(--bg);
    }

    /* Big bold orange hero band */
    #cover .cb-hero {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 320px;
      background: var(--primary);
      z-index: 1;
    }

    /* Decorative circles on hero */
    #cover .cb-hero::before {
      content: "";
      position: absolute;
      top: -80px;
      right: -80px;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: var(--secondary);
      opacity: 0.35;
    }

    #cover .cb-hero::after {
      content: "";
      position: absolute;
      bottom: -40px;
      left: 60px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.2;
    }

    /* Decorative square accent */
    #cover .cb-square {
      position: absolute;
      top: 40px;
      left: 48px;
      width: 18px;
      height: 18px;
      background: rgba(255,255,255,0.3);
      z-index: 2;
    }

    #cover .cb-square-2 {
      position: absolute;
      top: 68px;
      left: 56px;
      width: 10px;
      height: 10px;
      background: rgba(255,255,255,0.2);
      z-index: 2;
    }

    #cover .cover-hero-text {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 320px;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 64px;
    }

    #cover .cover-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      margin-bottom: 14px;
    }

    #cover .cover-title {
      font-size: 38px;
      font-weight: 900;
      color: #ffffff;
      line-height: 1.15;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    #cover .cover-subtitle {
      font-size: 18px;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
    }

    #cover .cover-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 220px;
      z-index: 2;
      display: flex;
      align-items: flex-end;
      padding: 0 64px 36px;
      gap: 0;
      justify-content: space-between;
    }

    #cover .cover-footer .cf-chip {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #cover .cover-footer .cf-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--primary);
      flex-shrink: 0;
    }

    #cover .cover-footer .cf-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    #cover .cover-footer .cf-date {
      font-size: 14px;
      color: var(--text-light);
    }

    /* Decorative shapes bottom-right area */
    #cover .deco-shapes {
      position: absolute;
      bottom: 30px;
      right: 48px;
      z-index: 2;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #cover .ds-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 3px solid var(--border);
    }

    #cover .ds-square {
      width: 22px;
      height: 22px;
      background: var(--surface);
      border: 3px solid var(--border);
    }

    #cover .ds-circle.big {
      width: 40px;
      height: 40px;
      border-color: var(--secondary);
      border-width: 3px;
    }

    /* --- CONTENT --- */
    #content {
      background: var(--bg);
    }

    #content .cb-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: var(--primary);
      z-index: 2;
      display: flex;
      align-items: center;
      padding: 0 60px;
    }

    #content .cb-header::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: var(--secondary);
    }

    #content .cb-header h2 {
      font-size: 24px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.3px;
    }

    /* Numbered list with CSS counters */
    #content .content-body {
      position: absolute;
      top: 80px;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 28px 60px 28px;
      display: grid;
      grid-template-columns: 1fr 200px;
      gap: 32px;
    }

    #content .numbered-list {
      list-style: none;
      counter-reset: lesson-counter;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
    }

    #content .numbered-list li {
      counter-increment: lesson-counter;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 16px;
      color: var(--text);
      line-height: 1.4;
    }

    #content .numbered-list li::before {
      content: counter(lesson-counter);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--primary);
      color: #ffffff;
      font-size: 17px;
      font-weight: 800;
      flex-shrink: 0;
    }

    #content .numbered-list li:nth-child(2)::before {
      background: var(--accent);
    }

    #content .numbered-list li:nth-child(3)::before {
      background: var(--secondary);
      color: var(--heading);
    }

    #content .numbered-list li:nth-child(4)::before {
      background: var(--primary);
    }

    /* Right accent panel */
    #content .accent-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
      justify-content: center;
      align-items: center;
    }

    .ap-badge {
      width: 100%;
      text-align: center;
      padding: 14px 12px;
      border-radius: 12px;
      background: var(--surface);
      border: 2px solid var(--border);
    }

    .ap-badge .ap-num {
      font-size: 28px;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
    }

    .ap-badge .ap-lbl {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-light);
      margin-top: 4px;
    }

    .ap-badge:nth-child(2) .ap-num {
      color: var(--accent);
    }

    /* --- DATA --- */
    #data {
      background: var(--bg);
    }

    #data .cb-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: var(--primary);
      z-index: 2;
      display: flex;
      align-items: center;
      padding: 0 60px;
    }

    #data .cb-header::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: var(--secondary);
    }

    #data .cb-header h2 {
      font-size: 24px;
      font-weight: 800;
      color: #ffffff;
    }

    #data .data-body {
      position: absolute;
      top: 86px;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 24px 60px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #data .bar-row {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
    }

    #data .bar-label {
      font-size: 14px;
      font-weight: 800;
      color: var(--heading);
      width: 32px;
      flex-shrink: 0;
      text-align: right;
    }

    #data .bar-track {
      flex: 1;
      height: 40px;
      background: var(--surface);
      border-radius: 8px;
      border: 2px solid var(--border);
      overflow: hidden;
    }

    #data .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 14px;
    }

    #data .bar-fill span {
      font-size: 14px;
      font-weight: 800;
      color: #fff;
    }

    #data .bar-fill.accent {
      background: linear-gradient(90deg, var(--accent) 0%, #0077CC 100%);
    }

    #data .bar-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-light);
      width: 40px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <nav class="preview-nav">
    <a href="#cover">표지 Cover</a>
    <a href="#content">내용 Content</a>
    <a href="#data">데이터 Data</a>
  </nav>

  <div class="slide-wrapper">

    <!-- ============================================================
         SECTION 1: COVER
         ============================================================ -->
    <section class="slide-section" id="cover">
      <div class="cb-hero"></div>
      <div class="cb-square"></div>
      <div class="cb-square-2"></div>

      <div class="cover-hero-text">
        <p class="cover-label">Annual Report 2026</p>
        <h1 class="cover-title">2026 연간 사업 보고서</h1>
        <p class="cover-subtitle">성장과 혁신의 여정</p>
      </div>

      <div class="cover-footer">
        <div class="cf-chip">
          <div class="cf-dot"></div>
          <span class="cf-text">홍길동 / 전략기획팀</span>
        </div>
        <span class="cf-date">2026년 3월</span>
      </div>

      <div class="deco-shapes">
        <div class="ds-circle"></div>
        <div class="ds-square"></div>
        <div class="ds-circle big"></div>
      </div>
    </section>

    <!-- ============================================================
         SECTION 2: CONTENT
         ============================================================ -->
    <section class="slide-section" id="content">
      <div class="cb-header">
        <h2>핵심 성과 요약</h2>
      </div>

      <div class="content-body">
        <ol class="numbered-list">
          <li>매출 전년 대비 32% 성장 달성</li>
          <li>신규 고객 1,200개사 확보</li>
          <li>직원 만족도 4.5/5.0 기록</li>
          <li>해외 시장 3개국 진출 완료</li>
        </ol>

        <div class="accent-panel">
          <div class="ap-badge">
            <div class="ap-num">+32%</div>
            <div class="ap-lbl">매출 성장</div>
          </div>
          <div class="ap-badge">
            <div class="ap-num">3개국</div>
            <div class="ap-lbl">해외 진출</div>
          </div>
        </div>
      </div>
    </section>

    <!-- ============================================================
         SECTION 3: DATA
         ============================================================ -->
    <section class="slide-section" id="data">
      <div class="cb-header">
        <h2>분기별 실적 추이</h2>
      </div>

      <div class="data-body">

        <div class="bar-row">
          <div class="bar-label">Q1</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:40%">
              <span>2.4억</span>
            </div>
          </div>
          <div class="bar-value">40%</div>
        </div>

        <div class="bar-row">
          <div class="bar-label">Q2</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:52%">
              <span>3.1억</span>
            </div>
          </div>
          <div class="bar-value">52%</div>
        </div>

        <div class="bar-row">
          <div class="bar-label">Q3</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:63%">
              <span>3.8억</span>
            </div>
          </div>
          <div class="bar-value">63%</div>
        </div>

        <div class="bar-row">
          <div class="bar-label">Q4</div>
          <div class="bar-track">
            <div class="bar-fill accent" style="width:75%">
              <span>4.5억</span>
            </div>
          </div>
          <div class="bar-value">75%</div>
        </div>

      </div>
    </section>

  </div><!-- /.slide-wrapper -->

</body>
</html>
