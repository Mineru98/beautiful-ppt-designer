<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>그라디언트 플로우 / Gradient Flow - Preview</title>
  <link rel="stylesheet" href="../assets/preview.css">

  <!-- Gradient-Flow color overrides -->
  <style>
    :root {
      --primary:    #6C3DE0;
      --secondary:  #E03D8F;
      --accent:     #00D4FF;
      --bg:         #0F0A2E;
      --surface:    rgba(255,255,255,0.10);
      --text:       #F0EEFF;
      --text-light: #A89FCE;
      --heading:    #FFFFFF;
      --border:     rgba(255,255,255,0.15);
    }
  </style>

  <!-- Gradient-Flow: Full-bleed Gradient + Frosted Glass archetype -->
  <style>
    /* ----------------------------------------------------------------
       FULL-BLEED GRADIENT archetype
       Dark gradient fills entire slide. Frosted glass card overlays
       (semi-transparent white bg with backdrop-filter blur).
       Rounded corners 12px everywhere. Purple-to-pink gradient accents.
    ---------------------------------------------------------------- */

    /* Full-bleed gradient applied to all sections */
    .slide-section {
      background: linear-gradient(135deg, #0F0A2E 0%, #1A0A3E 40%, #0D1A3A 100%) !important;
    }

    /* Ambient glow orbs (CSS only, no JS) */
    .gf-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    .gf-orb-1 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(108,61,224,0.5) 0%, transparent 70%);
      top: -100px;
      left: -80px;
    }

    .gf-orb-2 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(224,61,143,0.4) 0%, transparent 70%);
      bottom: -80px;
      right: -60px;
    }

    .gf-orb-3 {
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(0,212,255,0.25) 0%, transparent 70%);
      top: 50%;
      right: 120px;
      transform: translateY(-50%);
    }

    /* Frosted glass card base */
    .glass-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
    }

    /* ---- COVER ---- */
    #cover {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #cover .cover-card {
      position: relative;
      z-index: 2;
      padding: 52px 60px;
      max-width: 680px;
      width: calc(100% - 120px);
      text-align: left;
    }

    #cover .cover-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 24px;
    }

    #cover .cover-title {
      font-size: 38px;
      font-weight: 800;
      color: var(--heading);
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 14px;
      /* Gradient text */
      background: linear-gradient(90deg, #FFFFFF 0%, #C4B0FF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #cover .cover-subtitle {
      font-size: 18px;
      font-weight: 300;
      color: var(--text-light);
      margin-bottom: 36px;
    }

    #cover .cover-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.15);
    }

    #cover .cover-author {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    #cover .cover-date {
      font-size: 13px;
      color: var(--text-light);
    }

    /* ---- CONTENT ---- */
    #content {
      padding: 40px 48px;
    }

    #content .content-inner {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    #content .slide-heading {
      font-size: 22px;
      font-weight: 700;
      color: var(--heading);
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #content .slide-heading::before {
      content: "";
      display: inline-block;
      width: 4px;
      height: 22px;
      border-radius: 2px;
      background: linear-gradient(180deg, var(--primary), var(--secondary));
      flex-shrink: 0;
    }

    #content .bullet-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-content: center;
    }

    #content .bullet-card {
      padding: 16px 18px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    #content .bullet-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      flex-shrink: 0;
      margin-top: 7px;
      box-shadow: 0 0 8px rgba(0,212,255,0.6);
    }

    #content .bullet-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.5;
    }

    /* ---- DATA ---- */
    #data {
      padding: 40px 48px;
    }

    #data .data-inner {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    #data .slide-heading {
      font-size: 22px;
      font-weight: 700;
      color: var(--heading);
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #data .slide-heading::before {
      content: "";
      display: inline-block;
      width: 4px;
      height: 22px;
      border-radius: 2px;
      background: linear-gradient(180deg, var(--accent), var(--primary));
      flex-shrink: 0;
    }

    #data .bar-chart {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      gap: 10px;
    }

    #data .bar-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #data .bar-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-light);
      width: 28px;
      flex-shrink: 0;
      text-align: right;
    }

    #data .bar-track {
      flex: 1;
      height: 38px;
      background: rgba(255,255,255,0.07);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }

    #data .bar-fill {
      height: 100%;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 14px;
    }

    #data .bar-fill.q1 { background: linear-gradient(90deg, rgba(108,61,224,0.7) 0%, rgba(108,61,224,0.9) 100%); }
    #data .bar-fill.q2 { background: linear-gradient(90deg, rgba(108,61,224,0.7) 0%, rgba(168,61,224,0.9) 100%); }
    #data .bar-fill.q3 { background: linear-gradient(90deg, rgba(108,61,224,0.7) 0%, rgba(224,61,143,0.9) 100%); }
    #data .bar-fill.q4 {
      background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 60%, var(--accent) 100%);
      box-shadow: 0 0 20px rgba(0,212,255,0.3);
    }

    #data .bar-fill span {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }

    #data .bar-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      width: 44px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- Tab navigation -->
  <nav class="preview-nav">
    <a href="#cover">표지 Cover</a>
    <a href="#content">내용 Content</a>
    <a href="#data">데이터 Data</a>
  </nav>

  <div class="slide-wrapper">

    <!-- ============================================================
         SECTION 1: COVER — frosted glass card on gradient bg
         ============================================================ -->
    <section class="slide-section" id="cover">
      <!-- Ambient orbs -->
      <div class="gf-orb gf-orb-1"></div>
      <div class="gf-orb gf-orb-2"></div>
      <div class="gf-orb gf-orb-3"></div>

      <div class="cover-card glass-card">
        <div class="cover-badge">Annual Report 2026</div>
        <h1 class="cover-title">2026 연간 사업 보고서</h1>
        <p class="cover-subtitle">성장과 혁신의 여정</p>
        <div class="cover-footer">
          <span class="cover-author">홍길동 / 전략기획팀</span>
          <span class="cover-date">2026년 3월</span>
        </div>
      </div>
    </section>

    <!-- ============================================================
         SECTION 2: CONTENT — frosted glass bullet cards
         ============================================================ -->
    <section class="slide-section" id="content">
      <div class="gf-orb gf-orb-1"></div>
      <div class="gf-orb gf-orb-2"></div>

      <div class="content-inner">
        <h2 class="slide-heading">핵심 성과 요약</h2>
        <div class="bullet-grid">
          <div class="bullet-card glass-card">
            <div class="bullet-dot"></div>
            <span class="bullet-text">매출 전년 대비 32% 성장 달성</span>
          </div>
          <div class="bullet-card glass-card">
            <div class="bullet-dot"></div>
            <span class="bullet-text">신규 고객 1,200개사 확보</span>
          </div>
          <div class="bullet-card glass-card">
            <div class="bullet-dot"></div>
            <span class="bullet-text">직원 만족도 4.5/5.0 기록</span>
          </div>
          <div class="bullet-card glass-card">
            <div class="bullet-dot"></div>
            <span class="bullet-text">해외 시장 3개국 진출 완료</span>
          </div>
        </div>
      </div>
    </section>

    <!-- ============================================================
         SECTION 3: DATA — gradient bars
         ============================================================ -->
    <section class="slide-section" id="data">
      <div class="gf-orb gf-orb-1"></div>
      <div class="gf-orb gf-orb-2"></div>

      <div class="data-inner">
        <h2 class="slide-heading">분기별 실적 추이</h2>
        <div class="bar-chart">

          <div class="bar-row">
            <div class="bar-label">Q1</div>
            <div class="bar-track">
              <div class="bar-fill q1" style="width: 40%"><span>2.4억</span></div>
            </div>
            <div class="bar-value">40%</div>
          </div>

          <div class="bar-row">
            <div class="bar-label">Q2</div>
            <div class="bar-track">
              <div class="bar-fill q2" style="width: 52%"><span>3.1억</span></div>
            </div>
            <div class="bar-value">52%</div>
          </div>

          <div class="bar-row">
            <div class="bar-label">Q3</div>
            <div class="bar-track">
              <div class="bar-fill q3" style="width: 63%"><span>3.8억</span></div>
            </div>
            <div class="bar-value">63%</div>
          </div>

          <div class="bar-row">
            <div class="bar-label">Q4</div>
            <div class="bar-track">
              <div class="bar-fill q4" style="width: 75%"><span>4.5억</span></div>
            </div>
            <div class="bar-value">75%</div>
          </div>

        </div>
      </div>
    </section>

  </div><!-- /.slide-wrapper -->

</body>
</html>
