<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>메디컬 클리니컬 / Medical Clinical - Preview</title>
  <link rel="stylesheet" href="../assets/preview.css">

  <style>
    :root {
      --primary:    #0077B6;
      --secondary:  #48CAE4;
      --accent:     #00B4D8;
      --bg:         #F8FDFF;
      --surface:    #EDF6FA;
      --text:       #1A2E3B;
      --text-light: #5A8A9F;
      --heading:    #003D5C;
      --border:     #C4DFE9;
    }
  </style>

  <style>
    /* ----------------------------------------------------------------
       MEDICAL CLINICAL archetype
       White cards on ice-blue background. Round icon placeholder
       circles. Clean data boxes. Medical precision. Plus decorations.
    ---------------------------------------------------------------- */

    /* --- COVER --- */
    #cover {
      background: var(--bg);
    }

    #cover .mc-cross-tl {
      position: absolute;
      top: 28px;
      left: 32px;
      width: 32px;
      height: 32px;
      z-index: 1;
    }

    #cover .mc-cross-tl::before,
    #cover .mc-cross-tl::after {
      content: "";
      position: absolute;
      background: var(--accent);
      border-radius: 2px;
      opacity: 0.35;
    }

    #cover .mc-cross-tl::before {
      width: 32px;
      height: 10px;
      top: 11px;
      left: 0;
    }

    #cover .mc-cross-tl::after {
      width: 10px;
      height: 32px;
      top: 0;
      left: 11px;
    }

    #cover .mc-cross-br {
      position: absolute;
      bottom: 28px;
      right: 40px;
      width: 48px;
      height: 48px;
      z-index: 1;
    }

    #cover .mc-cross-br::before,
    #cover .mc-cross-br::after {
      content: "";
      position: absolute;
      background: var(--secondary);
      border-radius: 2px;
      opacity: 0.25;
    }

    #cover .mc-cross-br::before {
      width: 48px;
      height: 14px;
      top: 17px;
      left: 0;
    }

    #cover .mc-cross-br::after {
      width: 14px;
      height: 48px;
      top: 0;
      left: 17px;
    }

    /* Left accent stripe */
    #cover .mc-stripe {
      position: absolute;
      top: 0;
      left: 0;
      width: 8px;
      height: 100%;
      background: linear-gradient(180deg, var(--primary) 0%, var(--secondary) 100%);
    }

    #cover .cover-grid {
      position: absolute;
      top: 0;
      left: 8px;
      right: 0;
      bottom: 0;
      display: grid;
      grid-template-columns: 1fr 300px;
    }

    #cover .cover-left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px 48px 48px 52px;
    }

    #cover .cover-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    #cover .cover-title {
      font-size: 34px;
      font-weight: 800;
      color: var(--heading);
      line-height: 1.2;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    #cover .cover-subtitle {
      font-size: 17px;
      font-weight: 400;
      color: var(--text-light);
      margin-bottom: 36px;
    }

    #cover .cover-meta-row {
      display: flex;
      gap: 28px;
    }

    #cover .cover-meta-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    #cover .meta-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-light);
    }

    #cover .meta-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    /* Right panel — icon circles */
    #cover .cover-right {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 40px 24px;
    }

    #cover .icon-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #cover .icon-circle.ic-primary {
      border-color: var(--primary);
      background: rgba(0,119,182,0.06);
      width: 88px;
      height: 88px;
    }

    #cover .icon-circle .ic-inner {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--border);
    }

    #cover .icon-circle.ic-primary .ic-inner {
      border-color: var(--primary);
      opacity: 0.5;
    }

    #cover .icon-row {
      display: flex;
      gap: 14px;
    }

    /* --- CONTENT --- */
    #content {
      background: var(--bg);
    }

    #content .mc-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 68px;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 48px;
      z-index: 2;
    }

    #content .mc-header::before {
      content: "";
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 12px;
      flex-shrink: 0;
    }

    #content .mc-header h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--heading);
    }

    #content .mc-header .mc-header-cross {
      margin-left: auto;
      width: 22px;
      height: 22px;
      position: relative;
    }

    #content .mc-header .mc-header-cross::before,
    #content .mc-header .mc-header-cross::after {
      content: "";
      position: absolute;
      background: var(--border);
      border-radius: 1px;
    }

    #content .mc-header .mc-header-cross::before {
      width: 22px;
      height: 7px;
      top: 7.5px;
      left: 0;
    }

    #content .mc-header .mc-header-cross::after {
      width: 7px;
      height: 22px;
      top: 0;
      left: 7.5px;
    }

    #content .content-body {
      position: absolute;
      top: 68px;
      left: 0;
      right: 0;
      bottom: 0;
      display: grid;
      grid-template-columns: 1fr 240px;
      gap: 0;
      padding: 28px 48px;
      gap: 24px;
    }

    #content .content-main {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .mc-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 1px 4px rgba(0,100,160,0.06);
    }

    .mc-card .mc-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mc-card .mc-dot::after {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
    }

    .mc-card .mc-card-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.4;
    }

    #content .content-sidebar {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .mc-stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(0,100,160,0.06);
    }

    .mc-stat-box .msb-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .mc-stat-box .msb-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1.1;
    }

    .mc-stat-box .msb-sub {
      font-size: 11px;
      color: var(--text-light);
      margin-top: 2px;
    }

    /* --- DATA --- */
    #data {
      background: var(--bg);
    }

    #data .mc-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 68px;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 48px;
      z-index: 2;
    }

    #data .mc-header::before {
      content: "";
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 12px;
      flex-shrink: 0;
    }

    #data .mc-header h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--heading);
    }

    #data .data-body {
      position: absolute;
      top: 68px;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 28px 48px 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #data .bar-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
    }

    #data .bar-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--heading);
      width: 32px;
      flex-shrink: 0;
      text-align: right;
    }

    #data .bar-track {
      flex: 1;
      height: 38px;
      background: var(--surface);
      border-radius: 6px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: inset 0 1px 3px rgba(0,100,160,0.06);
    }

    #data .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 12px;
    }

    #data .bar-fill span {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }

    #data .bar-fill.accent {
      background: linear-gradient(90deg, var(--accent) 0%, var(--secondary) 100%);
    }

    #data .bar-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      width: 40px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <nav class="preview-nav">
    <a href="#cover">표지 Cover</a>
    <a href="#content">내용 Content</a>
    <a href="#data">데이터 Data</a>
  </nav>

  <div class="slide-wrapper">

    <!-- ============================================================
         SECTION 1: COVER
         ============================================================ -->
    <section class="slide-section" id="cover">
      <div class="mc-stripe"></div>
      <div class="mc-cross-tl"></div>
      <div class="mc-cross-br"></div>

      <div class="cover-grid">
        <div class="cover-left">
          <p class="cover-eyebrow">Annual Report 2026</p>
          <h1 class="cover-title">2026 연간 사업 보고서</h1>
          <p class="cover-subtitle">성장과 혁신의 여정</p>
          <div class="cover-meta-row">
            <div class="cover-meta-item">
              <span class="meta-label">담당자</span>
              <span class="meta-value">홍길동 / 전략기획팀</span>
            </div>
            <div class="cover-meta-item">
              <span class="meta-label">일자</span>
              <span class="meta-value">2026년 3월</span>
            </div>
          </div>
        </div>

        <div class="cover-right">
          <div class="icon-circle ic-primary">
            <div class="ic-inner"></div>
          </div>
          <div class="icon-row">
            <div class="icon-circle">
              <div class="ic-inner"></div>
            </div>
            <div class="icon-circle">
              <div class="ic-inner"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ============================================================
         SECTION 2: CONTENT
         ============================================================ -->
    <section class="slide-section" id="content">
      <div class="mc-header">
        <h2>핵심 성과 요약</h2>
        <div class="mc-header-cross"></div>
      </div>

      <div class="content-body">
        <div class="content-main">
          <div class="mc-card">
            <div class="mc-dot"></div>
            <span class="mc-card-text">매출 전년 대비 32% 성장 달성</span>
          </div>
          <div class="mc-card">
            <div class="mc-dot"></div>
            <span class="mc-card-text">신규 고객 1,200개사 확보</span>
          </div>
          <div class="mc-card">
            <div class="mc-dot"></div>
            <span class="mc-card-text">직원 만족도 4.5/5.0 기록</span>
          </div>
          <div class="mc-card">
            <div class="mc-dot"></div>
            <span class="mc-card-text">해외 시장 3개국 진출 완료</span>
          </div>
        </div>

        <div class="content-sidebar">
          <div class="mc-stat-box">
            <div class="msb-label">매출 성장</div>
            <div class="msb-value">+32%</div>
            <div class="msb-sub">전년 대비</div>
          </div>
          <div class="mc-stat-box">
            <div class="msb-label">신규 고객</div>
            <div class="msb-value">1,200</div>
            <div class="msb-sub">개사 확보</div>
          </div>
          <div class="mc-stat-box">
            <div class="msb-label">해외 진출</div>
            <div class="msb-value">3개국</div>
            <div class="msb-sub">신규 시장</div>
          </div>
        </div>
      </div>
    </section>

    <!-- ============================================================
         SECTION 3: DATA
         ============================================================ -->
    <section class="slide-section" id="data">
      <div class="mc-header">
        <h2>분기별 실적 추이</h2>
        <div class="mc-header-cross"></div>
      </div>

      <div class="data-body">

        <div class="bar-row">
          <div class="bar-label">Q1</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:40%">
              <span>2.4억</span>
            </div>
          </div>
          <div class="bar-value">40%</div>
        </div>

        <div class="bar-row">
          <div class="bar-label">Q2</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:52%">
              <span>3.1억</span>
            </div>
          </div>
          <div class="bar-value">52%</div>
        </div>

        <div class="bar-row">
          <div class="bar-label">Q3</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:63%">
              <span>3.8억</span>
            </div>
          </div>
          <div class="bar-value">63%</div>
        </div>

        <div class="bar-row">
          <div class="bar-label">Q4</div>
          <div class="bar-track">
            <div class="bar-fill accent" style="width:75%">
              <span>4.5억</span>
            </div>
          </div>
          <div class="bar-value">75%</div>
        </div>

      </div>
    </section>

  </div><!-- /.slide-wrapper -->

</body>
</html>
