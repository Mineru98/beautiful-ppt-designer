<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>미니멀 클린 / Minimal Clean - Preview</title>
  <link rel="stylesheet" href="../assets/preview.css">

  <!-- Minimal-Clean color overrides -->
  <style>
    :root {
      --primary:    #1A1A1A;
      --secondary:  #4A4A4A;
      --accent:     #0066CC;
      --bg:         #FFFFFF;
      --surface:    #F7F7F7;
      --text:       #1A1A1A;
      --text-light: #767676;
      --heading:    #0D0D0D;
      --border:     #E0E0E0;
    }
  </style>

  <!-- Minimal-Clean: Centered Minimal archetype -->
  <style>
    /* ----------------------------------------------------------------
       CENTERED MINIMAL archetype
       Everything centered, generous whitespace, thin accent lines only.
       No decorative elements. Ultra-clean with breathing room.
       Cover: title centered vertically AND horizontally.
    ---------------------------------------------------------------- */

    /* --- COVER --- */
    #cover {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #cover .cover-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 680px;
    }

    /* Thin top accent line above title */
    #cover .cover-accent-line {
      width: 48px;
      height: 2px;
      background: var(--accent);
      margin-bottom: 36px;
    }

    #cover .cover-title {
      font-size: 42px;
      font-weight: 700;
      color: var(--heading);
      line-height: 1.2;
      letter-spacing: -1px;
      margin-bottom: 16px;
    }

    #cover .cover-subtitle {
      font-size: 18px;
      font-weight: 300;
      color: var(--text-light);
      letter-spacing: 0.5px;
      margin-bottom: 48px;
    }

    /* Thin bottom accent line below subtitle */
    #cover .cover-divider {
      width: 200px;
      height: 1px;
      background: var(--border);
      margin-bottom: 28px;
    }

    #cover .cover-meta {
      display: flex;
      gap: 32px;
      font-size: 13px;
      color: var(--text-light);
      letter-spacing: 0.3px;
    }

    #cover .cover-meta .cover-author {
      font-weight: 500;
      color: var(--text);
    }

    /* --- CONTENT --- */
    #content {
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    #content .content-header {
      padding: 52px 80px 0;
    }

    #content .slide-heading {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    #content .slide-title {
      font-size: 26px;
      font-weight: 700;
      color: var(--heading);
      margin-bottom: 0;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    #content .content-body {
      flex: 1;
      padding: 32px 80px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    #content .bullet-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    #content .bullet-list li {
      font-size: 17px;
      color: var(--text);
      padding-left: 0;
      position: relative;
      line-height: 1.6;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    #content .bullet-list li .bullet-num {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1px;
      min-width: 20px;
      flex-shrink: 0;
    }

    /* --- DATA --- */
    #data {
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    #data .data-header {
      padding: 52px 80px 0;
    }

    #data .slide-heading {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    #data .slide-title {
      font-size: 26px;
      font-weight: 700;
      color: var(--heading);
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    #data .data-body {
      flex: 1;
      padding: 32px 80px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    #data .bar-chart {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #data .bar-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #data .bar-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      width: 28px;
      flex-shrink: 0;
      text-align: right;
      letter-spacing: 0.5px;
    }

    #data .bar-track {
      flex: 1;
      height: 2px;
      background: var(--border);
      position: relative;
    }

    /* Thin line bar: the fill sits on top of the thin track */
    #data .bar-track-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #data .bar-fill-line {
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      position: relative;
    }

    #data .bar-fill-line::after {
      content: "";
      position: absolute;
      right: 0;
      top: -4px;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--accent);
    }

    #data .bar-bg-line {
      height: 1px;
      background: var(--border);
      width: 100%;
    }

    #data .bar-amount {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      width: 42px;
      flex-shrink: 0;
      text-align: right;
    }

    #data .bar-pct {
      font-size: 12px;
      color: var(--text-light);
      width: 36px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- Tab navigation -->
  <nav class="preview-nav">
    <a href="#cover">표지 Cover</a>
    <a href="#content">내용 Content</a>
    <a href="#data">데이터 Data</a>
  </nav>

  <div class="slide-wrapper">

    <!-- ============================================================
         SECTION 1: COVER — centered vertically and horizontally
         ============================================================ -->
    <section class="slide-section" id="cover">
      <div class="cover-inner">
        <div class="cover-accent-line"></div>
        <h1 class="cover-title">2026 연간 사업 보고서</h1>
        <p class="cover-subtitle">성장과 혁신의 여정</p>
        <div class="cover-divider"></div>
        <div class="cover-meta">
          <span class="cover-author">홍길동 / 전략기획팀</span>
          <span class="cover-date">2026년 3월</span>
        </div>
      </div>
    </section>

    <!-- ============================================================
         SECTION 2: CONTENT
         ============================================================ -->
    <section class="slide-section" id="content">
      <div class="content-header">
        <p class="slide-heading">Key Highlights</p>
        <h2 class="slide-title">핵심 성과 요약</h2>
      </div>
      <div class="content-body">
        <ul class="bullet-list">
          <li><span class="bullet-num">01</span>매출 전년 대비 32% 성장 달성</li>
          <li><span class="bullet-num">02</span>신규 고객 1,200개사 확보</li>
          <li><span class="bullet-num">03</span>직원 만족도 4.5/5.0 기록</li>
          <li><span class="bullet-num">04</span>해외 시장 3개국 진출 완료</li>
        </ul>
      </div>
    </section>

    <!-- ============================================================
         SECTION 3: DATA
         ============================================================ -->
    <section class="slide-section" id="data">
      <div class="data-header">
        <p class="slide-heading">Quarterly Performance</p>
        <h2 class="slide-title">분기별 실적 추이</h2>
      </div>
      <div class="data-body">
        <div class="bar-chart">

          <div class="bar-row">
            <div class="bar-label">Q1</div>
            <div class="bar-track-wrap">
              <div class="bar-fill-line" style="width: 40%"></div>
              <div class="bar-bg-line"></div>
            </div>
            <div class="bar-amount">2.4억</div>
            <div class="bar-pct">40%</div>
          </div>

          <div class="bar-row">
            <div class="bar-label">Q2</div>
            <div class="bar-track-wrap">
              <div class="bar-fill-line" style="width: 52%"></div>
              <div class="bar-bg-line"></div>
            </div>
            <div class="bar-amount">3.1억</div>
            <div class="bar-pct">52%</div>
          </div>

          <div class="bar-row">
            <div class="bar-label">Q3</div>
            <div class="bar-track-wrap">
              <div class="bar-fill-line" style="width: 63%"></div>
              <div class="bar-bg-line"></div>
            </div>
            <div class="bar-amount">3.8억</div>
            <div class="bar-pct">63%</div>
          </div>

          <div class="bar-row">
            <div class="bar-label">Q4</div>
            <div class="bar-track-wrap">
              <div class="bar-fill-line" style="width: 75%"></div>
              <div class="bar-bg-line"></div>
            </div>
            <div class="bar-amount">4.5억</div>
            <div class="bar-pct">75%</div>
          </div>

        </div>
      </div>
    </section>

  </div><!-- /.slide-wrapper -->

</body>
</html>
