<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>네이처 오가닉 / Nature Organic - Preview</title>
  <link rel="stylesheet" href="../assets/preview.css">

  <!-- Nature-Organic color overrides -->
  <style>
    :root {
      --primary:    #4A6741;
      --secondary:  #C07B54;
      --accent:     #D4A843;
      --bg:         #F5F0E8;
      --surface:    #EDE6D6;
      --text:       #2E2A22;
      --text-light: #7A6E5F;
      --heading:    #2E3D28;
      --border:     #C8BDA8;
    }
  </style>

  <!-- Nature-Organic: Rounded Cards archetype -->
  <style>
    /* ----------------------------------------------------------------
       ROUNDED CARDS archetype
       Warm cream background. Content in rounded-corner cards
       (border-radius: 16px). Botanical-style wavy line dividers.
       Generous warm padding. Organic, handcrafted feel.
    ---------------------------------------------------------------- */

    .slide-section {
      background: var(--bg) !important;
    }

    /* Subtle warm texture overlay */
    .slide-section::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 10% 90%, rgba(74,103,65,0.07) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 10%, rgba(192,123,84,0.07) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ---- COVER ---- */
    #cover {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    #cover .cover-left {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 52px 40px 52px 56px;
    }

    #cover .cover-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--secondary);
      margin-bottom: 18px;
    }

    #cover .cover-title {
      font-size: 34px;
      font-weight: 700;
      color: var(--heading);
      line-height: 1.25;
      margin-bottom: 14px;
    }

    /* Wavy botanical divider — CSS border trick */
    #cover .cover-wave {
      width: 80px;
      height: 14px;
      border-bottom: 2px solid var(--primary);
      border-radius: 0 0 50% 50% / 0 0 8px 8px;
      margin-bottom: 18px;
      position: relative;
    }

    #cover .cover-wave::after {
      content: "";
      position: absolute;
      left: 24px;
      top: 4px;
      width: 56px;
      height: 10px;
      border-bottom: 2px solid var(--accent);
      border-radius: 0 0 50% 50% / 0 0 8px 8px;
      opacity: 0.6;
    }

    #cover .cover-subtitle {
      font-size: 17px;
      font-weight: 400;
      color: var(--text-light);
      margin-bottom: 36px;
      line-height: 1.5;
    }

    #cover .cover-meta-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 14px 18px;
      display: inline-flex;
      flex-direction: column;
      gap: 4px;
      border: 1px solid var(--border);
    }

    #cover .cover-author {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    #cover .cover-date {
      font-size: 12px;
      color: var(--text-light);
    }

    /* Right panel: decorative botanical element */
    #cover .cover-right {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border-left: 1px solid var(--border);
    }

    /* Large decorative circle with nested rings */
    #cover .cover-deco {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: var(--bg);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px rgba(46,42,34,0.08);
    }

    #cover .cover-deco-inner {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: var(--surface);
      border: 1.5px solid var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.7;
    }

    #cover .cover-deco-core {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      opacity: 0.8;
    }

    /* ---- CONTENT ---- */
    #content {
      padding: 40px 48px;
      display: flex;
      flex-direction: column;
    }

    #content .content-inner {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    #content .slide-heading {
      font-size: 22px;
      font-weight: 700;
      color: var(--heading);
      margin-bottom: 8px;
    }

    /* Botanical wavy divider under heading */
    #content .heading-wave {
      height: 12px;
      width: 160px;
      border-bottom: 2px solid var(--primary);
      border-radius: 0 0 50% 50% / 0 0 6px 6px;
      margin-bottom: 24px;
      position: relative;
    }

    #content .heading-wave::after {
      content: "";
      position: absolute;
      left: 20px;
      top: 3px;
      width: 140px;
      height: 9px;
      border-bottom: 1.5px solid var(--accent);
      border-radius: 0 0 50% 50% / 0 0 6px 6px;
      opacity: 0.5;
    }

    #content .bullet-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-content: center;
    }

    #content .bullet-card {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    #content .bullet-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--primary);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }

    #content .bullet-icon::after {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
    }

    #content .bullet-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.55;
    }

    /* ---- DATA ---- */
    #data {
      padding: 40px 48px;
      display: flex;
      flex-direction: column;
    }

    #data .data-inner {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    #data .slide-heading {
      font-size: 22px;
      font-weight: 700;
      color: var(--heading);
      margin-bottom: 8px;
    }

    #data .heading-wave {
      height: 12px;
      width: 200px;
      border-bottom: 2px solid var(--primary);
      border-radius: 0 0 50% 50% / 0 0 6px 6px;
      margin-bottom: 24px;
      position: relative;
    }

    #data .heading-wave::after {
      content: "";
      position: absolute;
      left: 20px;
      top: 3px;
      width: 180px;
      height: 9px;
      border-bottom: 1.5px solid var(--accent);
      border-radius: 0 0 50% 50% / 0 0 6px 6px;
      opacity: 0.5;
    }

    #data .bar-chart {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      gap: 10px;
    }

    #data .bar-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #data .bar-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-light);
      width: 28px;
      flex-shrink: 0;
      text-align: right;
    }

    #data .bar-track {
      flex: 1;
      height: 38px;
      background: var(--surface);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    #data .bar-fill {
      height: 100%;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 14px;
    }

    #data .bar-fill.q1 { background: linear-gradient(90deg, rgba(74,103,65,0.6), rgba(74,103,65,0.85)); }
    #data .bar-fill.q2 { background: linear-gradient(90deg, rgba(74,103,65,0.7), rgba(100,120,65,0.9)); }
    #data .bar-fill.q3 { background: linear-gradient(90deg, var(--primary), rgba(120,140,50,0.9)); }
    #data .bar-fill.q4 {
      background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 60%, var(--accent) 100%);
    }

    #data .bar-fill span {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }

    #data .bar-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      width: 44px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- Tab navigation -->
  <nav class="preview-nav">
    <a href="#cover">표지 Cover</a>
    <a href="#content">내용 Content</a>
    <a href="#data">데이터 Data</a>
  </nav>

  <div class="slide-wrapper">

    <!-- ============================================================
         SECTION 1: COVER — two-column, warm organic layout
         ============================================================ -->
    <section class="slide-section" id="cover">
      <div class="cover-left">
        <p class="cover-label">연간 사업 보고서 2026</p>
        <h1 class="cover-title">2026 연간 사업 보고서</h1>
        <div class="cover-wave"></div>
        <p class="cover-subtitle">성장과 혁신의 여정</p>
        <div class="cover-meta-card">
          <span class="cover-author">홍길동 / 전략기획팀</span>
          <span class="cover-date">2026년 3월</span>
        </div>
      </div>
      <div class="cover-right">
        <div class="cover-deco">
          <div class="cover-deco-inner">
            <div class="cover-deco-core"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- ============================================================
         SECTION 2: CONTENT — rounded card bullets
         ============================================================ -->
    <section class="slide-section" id="content">
      <div class="content-inner">
        <h2 class="slide-heading">핵심 성과 요약</h2>
        <div class="heading-wave"></div>
        <div class="bullet-grid">
          <div class="bullet-card">
            <div class="bullet-icon"></div>
            <span class="bullet-text">매출 전년 대비 32% 성장 달성</span>
          </div>
          <div class="bullet-card">
            <div class="bullet-icon"></div>
            <span class="bullet-text">신규 고객 1,200개사 확보</span>
          </div>
          <div class="bullet-card">
            <div class="bullet-icon"></div>
            <span class="bullet-text">직원 만족도 4.5/5.0 기록</span>
          </div>
          <div class="bullet-card">
            <div class="bullet-icon"></div>
            <span class="bullet-text">해외 시장 3개국 진출 완료</span>
          </div>
        </div>
      </div>
    </section>

    <!-- ============================================================
         SECTION 3: DATA — pill-shaped bars, warm palette
         ============================================================ -->
    <section class="slide-section" id="data">
      <div class="data-inner">
        <h2 class="slide-heading">분기별 실적 추이</h2>
        <div class="heading-wave"></div>
        <div class="bar-chart">

          <div class="bar-row">
            <div class="bar-label">Q1</div>
            <div class="bar-track">
              <div class="bar-fill q1" style="width: 40%"><span>2.4억</span></div>
            </div>
            <div class="bar-value">40%</div>
          </div>

          <div class="bar-row">
            <div class="bar-label">Q2</div>
            <div class="bar-track">
              <div class="bar-fill q2" style="width: 52%"><span>3.1억</span></div>
            </div>
            <div class="bar-value">52%</div>
          </div>

          <div class="bar-row">
            <div class="bar-label">Q3</div>
            <div class="bar-track">
              <div class="bar-fill q3" style="width: 63%"><span>3.8억</span></div>
            </div>
            <div class="bar-value">63%</div>
          </div>

          <div class="bar-row">
            <div class="bar-label">Q4</div>
            <div class="bar-track">
              <div class="bar-fill q4" style="width: 75%"><span>4.5억</span></div>
            </div>
            <div class="bar-value">75%</div>
          </div>

        </div>
      </div>
    </section>

  </div><!-- /.slide-wrapper -->

</body>
</html>
