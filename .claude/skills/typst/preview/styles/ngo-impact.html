<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NGO 임팩트 / NGO Impact - Preview</title>
  <link rel="stylesheet" href="../assets/preview.css">

  <style>
    :root {
      --primary:    #606C38;
      --secondary:  #DDA15E;
      --accent:     #BC6C25;
      --bg:         #FEFAE0;
      --surface:    #F5EDCC;
      --text:       #2A2510;
      --text-light: #7A7050;
      --heading:    #3A3A1A;
      --border:     #D8CCAA;
    }
  </style>

  <!-- NGO-Impact: Earth Warmth archetype -->
  <style>
    /* ----------------------------------------------------------------
       EARTH WARMTH archetype
       Warm amber/olive header band. Storytelling layout.
       Hand-drawn-style dashed underlines. Generous padding.
    ---------------------------------------------------------------- */

    /* --- COVER --- */
    #cover {
      background: var(--bg);
    }

    #cover .ngo-amber-band {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 260px;
      background: linear-gradient(135deg, var(--primary) 0%, #4A5728 60%, var(--secondary) 100%);
    }

    #cover .ngo-amber-band::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: var(--secondary);
    }

    #cover .ngo-cover-content {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 38px 68px 32px;
    }

    #cover .ngo-tag {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
      margin-bottom: 14px;
    }

    #cover .ngo-cover-title {
      font-size: 36px;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1.2;
      margin-bottom: 10px;
      border-bottom: 2px dashed rgba(255,255,255,0.45);
      padding-bottom: 14px;
      display: inline-block;
      align-self: flex-start;
    }

    #cover .ngo-cover-subtitle {
      font-size: 19px;
      font-weight: 400;
      color: rgba(255,255,255,0.9);
      margin-top: 12px;
      font-style: italic;
    }

    #cover .ngo-cover-footer {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 28px;
    }

    #cover .ngo-leaf {
      width: 36px;
      height: 36px;
      background: var(--secondary);
      border-radius: 50% 0 50% 0;
      flex-shrink: 0;
    }

    #cover .ngo-cover-author {
      font-size: 16px;
      font-weight: 700;
      color: var(--heading);
    }

    #cover .ngo-cover-date {
      font-size: 15px;
      color: var(--text-light);
      margin-left: auto;
    }

    /* --- CONTENT --- */
    #content {
      background: var(--bg);
    }

    #content .ngo-content-olive-band {
      position: absolute;
      top: 0;
      left: 0;
      width: 200px;
      height: 100%;
      background: var(--primary);
    }

    #content .ngo-content-olive-band::after {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      width: 5px;
      height: 100%;
      background: var(--secondary);
    }

    #content .ngo-sidebar-label {
      position: absolute;
      top: 0;
      left: 0;
      width: 200px;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 10px;
      z-index: 2;
    }

    #content .ngo-sidebar-title {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      font-size: 22px;
      font-weight: 800;
      color: #FFFFFF;
      letter-spacing: 2px;
    }

    #content .ngo-sidebar-deco {
      width: 40px;
      height: 3px;
      background: var(--secondary);
      border-radius: 2px;
    }

    #content .ngo-content-main {
      position: absolute;
      top: 0;
      left: 205px;
      right: 0;
      bottom: 0;
      padding: 36px 52px;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
    }

    #content .ngo-bullet-item {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      padding-bottom: 16px;
      border-bottom: 1px dashed var(--border);
    }

    #content .ngo-bullet-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    #content .ngo-bullet-icon {
      width: 28px;
      height: 28px;
      background: var(--secondary);
      border-radius: 50% 0 50% 0;
      flex-shrink: 0;
      margin-top: 2px;
    }

    #content .ngo-bullet-text {
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.5;
    }

    /* --- DATA --- */
    #data {
      background: var(--bg);
    }

    #data .ngo-data-header {
      padding: 24px 68px 16px;
      border-bottom: 2px dashed var(--border);
    }

    #data .ngo-data-header h2 {
      font-size: 26px;
      font-weight: 800;
      color: var(--heading);
      border-bottom: 3px wavy var(--secondary);
      display: inline-block;
      padding-bottom: 6px;
    }

    #data .ngo-data-body {
      position: absolute;
      top: 86px;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 20px 68px 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
    }

    #data .ngo-bar-row {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    #data .ngo-bar-label {
      font-size: 16px;
      font-weight: 700;
      color: var(--heading);
      width: 40px;
      flex-shrink: 0;
      text-align: right;
    }

    #data .ngo-bar-track {
      flex: 1;
      height: 36px;
      background: var(--surface);
      border-radius: 4px;
      border: 1px dashed var(--border);
      overflow: hidden;
    }

    #data .ngo-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 12px;
    }

    #data .ngo-bar-fill.peak {
      background: linear-gradient(90deg, var(--secondary), var(--accent));
    }

    #data .ngo-bar-fill span {
      font-size: 13px;
      font-weight: 700;
      color: #FFFFFF;
    }

    #data .ngo-bar-value {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-light);
      width: 60px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <nav class="preview-nav">
    <a href="#cover">표지 Cover</a>
    <a href="#content">내용 Content</a>
    <a href="#data">데이터 Data</a>
  </nav>

  <div class="slide-wrapper">

    <!-- SECTION 1: COVER -->
    <section class="slide-section" id="cover">
      <div class="ngo-amber-band"></div>
      <div class="ngo-cover-content">
        <p class="ngo-tag">Annual Report 2026</p>
        <h1 class="ngo-cover-title">2026 연간 사업 보고서</h1>
        <p class="ngo-cover-subtitle">성장과 혁신의 여정</p>
        <div class="ngo-cover-footer">
          <div class="ngo-leaf"></div>
          <span class="ngo-cover-author">홍길동 / 전략기획팀</span>
          <span class="ngo-cover-date">2026년 3월</span>
        </div>
      </div>
    </section>

    <!-- SECTION 2: CONTENT -->
    <section class="slide-section" id="content">
      <div class="ngo-content-olive-band"></div>
      <div class="ngo-sidebar-label">
        <div class="ngo-sidebar-deco"></div>
        <span class="ngo-sidebar-title">핵심 성과 요약</span>
        <div class="ngo-sidebar-deco"></div>
      </div>
      <div class="ngo-content-main">
        <div class="ngo-bullet-item">
          <div class="ngo-bullet-icon"></div>
          <span class="ngo-bullet-text">매출 전년 대비 32% 성장 달성</span>
        </div>
        <div class="ngo-bullet-item">
          <div class="ngo-bullet-icon"></div>
          <span class="ngo-bullet-text">신규 고객 1,200개사 확보</span>
        </div>
        <div class="ngo-bullet-item">
          <div class="ngo-bullet-icon"></div>
          <span class="ngo-bullet-text">직원 만족도 4.5/5.0 기록</span>
        </div>
        <div class="ngo-bullet-item">
          <div class="ngo-bullet-icon"></div>
          <span class="ngo-bullet-text">해외 시장 3개국 진출 완료</span>
        </div>
      </div>
    </section>

    <!-- SECTION 3: DATA -->
    <section class="slide-section" id="data">
      <div class="ngo-data-header">
        <h2>분기별 실적 추이</h2>
      </div>
      <div class="ngo-data-body">
        <div class="ngo-bar-row">
          <div class="ngo-bar-label">Q1</div>
          <div class="ngo-bar-track">
            <div class="ngo-bar-fill" style="width:40%"><span>2.4억</span></div>
          </div>
          <div class="ngo-bar-value">40%</div>
        </div>
        <div class="ngo-bar-row">
          <div class="ngo-bar-label">Q2</div>
          <div class="ngo-bar-track">
            <div class="ngo-bar-fill" style="width:52%"><span>3.1억</span></div>
          </div>
          <div class="ngo-bar-value">52%</div>
        </div>
        <div class="ngo-bar-row">
          <div class="ngo-bar-label">Q3</div>
          <div class="ngo-bar-track">
            <div class="ngo-bar-fill" style="width:63%"><span>3.8억</span></div>
          </div>
          <div class="ngo-bar-value">63%</div>
        </div>
        <div class="ngo-bar-row">
          <div class="ngo-bar-label">Q4</div>
          <div class="ngo-bar-track">
            <div class="ngo-bar-fill peak" style="width:75%"><span>4.5억</span></div>
          </div>
          <div class="ngo-bar-value">75%</div>
        </div>
      </div>
    </section>

  </div><!-- /.slide-wrapper -->

</body>
</html>
