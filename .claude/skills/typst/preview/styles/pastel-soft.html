<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>파스텔 소프트 / Pastel Soft - Preview</title>
  <link rel="stylesheet" href="../assets/preview.css">

  <style>
    :root {
      --primary:    #7B6FA0;
      --secondary:  #E8857A;
      --accent:     #5BAD8A;
      --bg:         #FDF8FF;
      --surface:    #FFFFFF;
      --text:       #3D3455;
      --text-light: #8E84A8;
      --heading:    #4A3F6B;
      --border:     #E5DCEF;
    }
  </style>

  <!-- Pastel-Soft: Bubble Cards archetype -->
  <style>
    /* ----------------------------------------------------------------
       BUBBLE CARDS archetype
       Large rounded-corner cards (border-radius: 20px).
       Soft drop shadows. Pill-shaped tags. Pastel gradient background.
    ---------------------------------------------------------------- */

    body {
      background: #EDE6F5;
    }

    .preview-nav a {
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
    }

    .preview-nav a:hover {
      background: var(--primary);
      color: #fff;
    }

    .slide-section {
      background: var(--bg);
    }

    /* ========== COVER ========== */
    #cover {
      display: none;
      background: linear-gradient(135deg, #FDF8FF 0%, #F0E8FF 50%, #FFE8F0 100%);
    }

    #cover .cover-blob-1 {
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(123,111,160,0.18) 0%, transparent 70%);
      top: -80px;
      right: -60px;
    }

    #cover .cover-blob-2 {
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232,133,122,0.15) 0%, transparent 70%);
      bottom: -60px;
      left: -40px;
    }

    #cover .cover-card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--surface);
      border-radius: 28px;
      box-shadow: 0 8px 40px rgba(123,111,160,0.18), 0 2px 8px rgba(123,111,160,0.08);
      padding: 44px 52px;
      width: 640px;
      z-index: 2;
    }

    #cover .cover-pill {
      display: inline-block;
      background: linear-gradient(135deg, rgba(123,111,160,0.12), rgba(91,173,138,0.12));
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 16px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 18px;
    }

    #cover .cover-title {
      font-size: 36px;
      font-weight: 800;
      color: var(--heading);
      line-height: 1.2;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    #cover .cover-subtitle {
      font-size: 17px;
      font-weight: 400;
      color: var(--text-light);
      margin-bottom: 28px;
    }

    #cover .cover-meta-row {
      display: flex;
      align-items: center;
      gap: 12px;
      border-top: 1px solid var(--border);
      padding-top: 18px;
    }

    #cover .meta-pill {
      display: inline-block;
      background: rgba(91,173,138,0.12);
      border: 1px solid rgba(91,173,138,0.3);
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }

    #cover .meta-date {
      margin-left: auto;
      font-size: 13px;
      color: var(--text-light);
    }

    /* ========== CONTENT ========== */
    #content {
      display: none;
      background: linear-gradient(160deg, #FDF8FF 0%, #F5EEFF 100%);
    }

    #content .content-header {
      position: absolute;
      top: 28px;
      left: 44px;
      right: 44px;
      z-index: 2;
    }

    #content .content-header h2 {
      font-size: 22px;
      font-weight: 800;
      color: var(--heading);
    }

    #content .heading-underline {
      width: 48px;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      margin-top: 6px;
    }

    #content .content-body {
      position: absolute;
      top: 96px;
      left: 44px;
      right: 44px;
      bottom: 28px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      z-index: 2;
    }

    #content .bullet-cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble-bullet {
      background: var(--surface);
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(123,111,160,0.1);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      border: 1px solid var(--border);
    }

    .bubble-bullet .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .bubble-bullet span {
      font-size: 15px;
      color: var(--text);
      line-height: 1.4;
    }

    #content .stat-cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .pastel-stat {
      background: var(--surface);
      border-radius: 20px;
      box-shadow: 0 2px 14px rgba(123,111,160,0.1);
      padding: 14px 20px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .pastel-stat .stat-icon {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(123,111,160,0.18), rgba(123,111,160,0.08));
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pastel-stat .stat-icon.green {
      background: linear-gradient(135deg, rgba(91,173,138,0.22), rgba(91,173,138,0.08));
    }

    .pastel-stat .stat-icon.pink {
      background: linear-gradient(135deg, rgba(232,133,122,0.22), rgba(232,133,122,0.08));
    }

    .pastel-stat .stat-icon span {
      font-size: 16px;
    }

    .pastel-stat .stat-info .stat-value {
      font-size: 20px;
      font-weight: 800;
      color: var(--heading);
      line-height: 1;
    }

    .pastel-stat .stat-info .stat-label {
      font-size: 11px;
      color: var(--text-light);
      margin-top: 2px;
    }

    /* ========== DATA ========== */
    #data {
      display: none;
      background: linear-gradient(160deg, #FDF8FF 0%, #FFF0F8 100%);
    }

    #data .data-header {
      position: absolute;
      top: 28px;
      left: 44px;
      right: 44px;
      z-index: 2;
    }

    #data .data-header h2 {
      font-size: 22px;
      font-weight: 800;
      color: var(--heading);
    }

    #data .heading-underline {
      width: 48px;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--secondary), var(--primary));
      margin-top: 6px;
    }

    #data .data-body {
      position: absolute;
      top: 96px;
      left: 44px;
      right: 44px;
      bottom: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      z-index: 2;
    }

    #data .bar-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #data .bar-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      width: 36px;
      flex-shrink: 0;
      text-align: right;
    }

    #data .bar-track {
      flex: 1;
      height: 36px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    #data .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), rgba(123,111,160,0.6));
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 14px;
    }

    #data .bar-fill span {
      font-size: 12px;
      font-weight: 700;
      color: #fff;
    }

    #data .bar-fill.accent {
      background: linear-gradient(90deg, var(--secondary), rgba(232,133,122,0.7));
    }

    #data .bar-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      width: 52px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <nav class="preview-nav">
    <a href="#cover">표지 Cover</a>
    <a href="#content">내용 Content</a>
    <a href="#data">데이터 Data</a>
  </nav>

  <div class="slide-wrapper">

    <!-- COVER -->
    <section class="slide-section" id="cover">
      <div class="cover-blob-1"></div>
      <div class="cover-blob-2"></div>

      <div class="cover-card">
        <div class="cover-pill">Annual Report 2026</div>
        <h1 class="cover-title">2026 연간 사업 보고서</h1>
        <p class="cover-subtitle">성장과 혁신의 여정</p>
        <div class="cover-meta-row">
          <span class="meta-pill">홍길동 / 전략기획팀</span>
          <span class="meta-date">2026년 3월</span>
        </div>
      </div>
    </section>

    <!-- CONTENT -->
    <section class="slide-section" id="content">
      <div class="content-header">
        <h2>핵심 성과 요약</h2>
        <div class="heading-underline"></div>
      </div>

      <div class="content-body">
        <div class="bullet-cards">
          <div class="bubble-bullet">
            <div class="dot"></div>
            <span>매출 전년 대비 32% 성장 달성</span>
          </div>
          <div class="bubble-bullet">
            <div class="dot"></div>
            <span>신규 고객 1,200개사 확보</span>
          </div>
          <div class="bubble-bullet">
            <div class="dot"></div>
            <span>직원 만족도 4.5/5.0 기록</span>
          </div>
          <div class="bubble-bullet">
            <div class="dot"></div>
            <span>해외 시장 3개국 진출 완료</span>
          </div>
        </div>

        <div class="stat-cards">
          <div class="pastel-stat">
            <div class="stat-icon"><span>📈</span></div>
            <div class="stat-info">
              <div class="stat-value">+32%</div>
              <div class="stat-label">매출 성장 · 전년 대비</div>
            </div>
          </div>
          <div class="pastel-stat">
            <div class="stat-icon green"><span>🏢</span></div>
            <div class="stat-info">
              <div class="stat-value">1,200</div>
              <div class="stat-label">신규 고객 개사 확보</div>
            </div>
          </div>
          <div class="pastel-stat">
            <div class="stat-icon pink"><span>🌍</span></div>
            <div class="stat-info">
              <div class="stat-value">3개국</div>
              <div class="stat-label">해외 신규 시장 진출</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- DATA -->
    <section class="slide-section" id="data">
      <div class="data-header">
        <h2>분기별 실적 추이</h2>
        <div class="heading-underline"></div>
      </div>

      <div class="data-body">

        <div class="bar-row">
          <div class="bar-label">Q1</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:40%">
              <span>2.4억</span>
            </div>
          </div>
          <div class="bar-value">40%</div>
        </div>

        <div class="bar-row">
          <div class="bar-label">Q2</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:52%">
              <span>3.1억</span>
            </div>
          </div>
          <div class="bar-value">52%</div>
        </div>

        <div class="bar-row">
          <div class="bar-label">Q3</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:63%">
              <span>3.8억</span>
            </div>
          </div>
          <div class="bar-value">63%</div>
        </div>

        <div class="bar-row">
          <div class="bar-label">Q4</div>
          <div class="bar-track">
            <div class="bar-fill accent" style="width:75%">
              <span>4.5억</span>
            </div>
          </div>
          <div class="bar-value">75%</div>
        </div>

      </div>
    </section>

  </div>

</body>
</html>
