<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>리테일 라이프스타일 / Retail Lifestyle - Preview</title>
  <link rel="stylesheet" href="../assets/preview.css">

  <style>
    :root {
      --primary:    #E07A5F;
      --secondary:  #F2CC8F;
      --accent:     #81B29A;
      --bg:         #F4F1DE;
      --surface:    #FEFCF3;
      --text:       #2A2418;
      --text-light: #7A6E58;
      --heading:    #1A1408;
      --border:     #D8CCAA;
    }
  </style>

  <!-- Retail-Lifestyle: Magazine Spread archetype -->
  <style>
    /* ----------------------------------------------------------------
       MAGAZINE SPREAD archetype
       Soft pastel cards with 12px rounded corners.
       Lifestyle imagery placeholder boxes (colored rectangles).
       Warm editorial aesthetic. Relaxed spacing.
    ---------------------------------------------------------------- */

    /* --- COVER --- */
    #cover {
      background: var(--bg);
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* Left editorial panel */
    #cover .rl-cover-left {
      background: var(--primary);
      padding: 48px 44px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-radius: 0 0 0 0;
    }

    #cover .rl-cover-tag {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
    }

    #cover .rl-cover-title {
      font-size: 34px;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    #cover .rl-cover-subtitle {
      font-size: 17px;
      font-weight: 400;
      color: rgba(255,255,255,0.88);
      font-style: italic;
    }

    #cover .rl-cover-pill {
      display: inline-flex;
      align-items: center;
      background: rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 8px 18px;
      gap: 10px;
      align-self: flex-start;
    }

    #cover .rl-cover-pill .pill-author {
      font-size: 14px;
      font-weight: 600;
      color: #FFFFFF;
    }

    #cover .rl-cover-pill .pill-date {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
    }

    /* Right photo mosaic */
    #cover .rl-cover-right {
      padding: 24px 28px;
      display: grid;
      grid-template-rows: 1fr 1fr;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      background: var(--bg);
    }

    #cover .rl-photo-box {
      border-radius: 12px;
      overflow: hidden;
    }

    #cover .rl-photo-box-1 {
      background: var(--accent);
      grid-row: 1 / 3;
      grid-column: 1;
      border-radius: 12px;
    }

    #cover .rl-photo-box-2 {
      background: var(--secondary);
      border-radius: 12px;
    }

    #cover .rl-photo-box-3 {
      background: #C9B89A;
      border-radius: 12px;
    }

    /* --- CONTENT --- */
    #content {
      background: var(--bg);
      padding: 32px 44px;
      display: flex;
      flex-direction: column;
    }

    #content .rl-content-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    #content .rl-content-dot {
      width: 16px;
      height: 16px;
      background: var(--primary);
      border-radius: 50%;
      flex-shrink: 0;
    }

    #content .rl-content-heading {
      font-size: 24px;
      font-weight: 800;
      color: var(--heading);
    }

    #content .rl-content-heading::after {
      content: "";
      display: block;
      width: 60px;
      height: 3px;
      background: var(--primary);
      border-radius: 2px;
      margin-top: 6px;
    }

    #content .rl-cards-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    #content .rl-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 18px 20px;
      border: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    #content .rl-card-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    #content .rl-card-icon-1 { background: var(--primary); }
    #content .rl-card-icon-2 { background: var(--accent); }
    #content .rl-card-icon-3 { background: var(--secondary); }
    #content .rl-card-icon-4 { background: #C9B89A; }

    #content .rl-card-text {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.5;
      margin-top: 4px;
    }

    /* --- DATA --- */
    #data {
      background: var(--bg);
      padding: 28px 44px;
      display: flex;
      flex-direction: column;
    }

    #data .rl-data-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    #data .rl-data-dot {
      width: 16px;
      height: 16px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
    }

    #data .rl-data-heading {
      font-size: 24px;
      font-weight: 800;
      color: var(--heading);
    }

    #data .rl-data-heading::after {
      content: "";
      display: block;
      width: 60px;
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin-top: 6px;
    }

    #data .rl-chart {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      gap: 10px;
    }

    #data .rl-bar-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #data .rl-bar-label {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      width: 40px;
      flex-shrink: 0;
      text-align: right;
    }

    #data .rl-bar-track {
      flex: 1;
      height: 36px;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    #data .rl-bar-fill {
      height: 100%;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 14px;
    }

    #data .rl-bar-fill-1 { background: linear-gradient(90deg, #C9B89A, var(--secondary)); }
    #data .rl-bar-fill-2 { background: linear-gradient(90deg, var(--secondary), #E8B07A); }
    #data .rl-bar-fill-3 { background: linear-gradient(90deg, var(--accent), #6A9E82); }
    #data .rl-bar-fill-4 { background: linear-gradient(90deg, var(--primary), #CC5A40); }

    #data .rl-bar-fill span {
      font-size: 13px;
      font-weight: 700;
      color: #FFFFFF;
    }

    #data .rl-bar-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-light);
      width: 56px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <nav class="preview-nav">
    <a href="#cover">표지 Cover</a>
    <a href="#content">내용 Content</a>
    <a href="#data">데이터 Data</a>
  </nav>

  <div class="slide-wrapper">

    <!-- SECTION 1: COVER -->
    <section class="slide-section" id="cover">
      <div class="rl-cover-left">
        <span class="rl-cover-tag">Annual Report 2026</span>
        <div>
          <h1 class="rl-cover-title">2026 연간<br>사업 보고서</h1>
          <p class="rl-cover-subtitle">성장과 혁신의 여정</p>
        </div>
        <div class="rl-cover-pill">
          <span class="pill-author">홍길동 / 전략기획팀</span>
          <span class="pill-date">2026년 3월</span>
        </div>
      </div>
      <div class="rl-cover-right">
        <div class="rl-photo-box-1"></div>
        <div class="rl-photo-box-2"></div>
        <div class="rl-photo-box-3"></div>
      </div>
    </section>

    <!-- SECTION 2: CONTENT -->
    <section class="slide-section" id="content">
      <div class="rl-content-header">
        <div class="rl-content-dot"></div>
        <h2 class="rl-content-heading">핵심 성과 요약</h2>
      </div>
      <div class="rl-cards-grid">
        <div class="rl-card">
          <div class="rl-card-icon rl-card-icon-1"></div>
          <span class="rl-card-text">매출 전년 대비 32% 성장 달성</span>
        </div>
        <div class="rl-card">
          <div class="rl-card-icon rl-card-icon-2"></div>
          <span class="rl-card-text">신규 고객 1,200개사 확보</span>
        </div>
        <div class="rl-card">
          <div class="rl-card-icon rl-card-icon-3"></div>
          <span class="rl-card-text">직원 만족도 4.5/5.0 기록</span>
        </div>
        <div class="rl-card">
          <div class="rl-card-icon rl-card-icon-4"></div>
          <span class="rl-card-text">해외 시장 3개국 진출 완료</span>
        </div>
      </div>
    </section>

    <!-- SECTION 3: DATA -->
    <section class="slide-section" id="data">
      <div class="rl-data-header">
        <div class="rl-data-dot"></div>
        <h2 class="rl-data-heading">분기별 실적 추이</h2>
      </div>
      <div class="rl-chart">
        <div class="rl-bar-row">
          <div class="rl-bar-label">Q1</div>
          <div class="rl-bar-track">
            <div class="rl-bar-fill rl-bar-fill-1" style="width:40%"><span>2.4억</span></div>
          </div>
          <div class="rl-bar-value">40%</div>
        </div>
        <div class="rl-bar-row">
          <div class="rl-bar-label">Q2</div>
          <div class="rl-bar-track">
            <div class="rl-bar-fill rl-bar-fill-2" style="width:52%"><span>3.1억</span></div>
          </div>
          <div class="rl-bar-value">52%</div>
        </div>
        <div class="rl-bar-row">
          <div class="rl-bar-label">Q3</div>
          <div class="rl-bar-track">
            <div class="rl-bar-fill rl-bar-fill-3" style="width:63%"><span>3.8억</span></div>
          </div>
          <div class="rl-bar-value">63%</div>
        </div>
        <div class="rl-bar-row">
          <div class="rl-bar-label">Q4</div>
          <div class="rl-bar-track">
            <div class="rl-bar-fill rl-bar-fill-4" style="width:75%"><span>4.5억</span></div>
          </div>
          <div class="rl-bar-value">75%</div>
        </div>
      </div>
    </section>

  </div><!-- /.slide-wrapper -->

</body>
</html>
